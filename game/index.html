<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Legendary Destruction Derby</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<canvas id="gameCanvas"></canvas>

<div id="pause-overlay">
    <h1>PAUSED</h1>
    <div class="sub">Press ESC or click to resume</div>
    <button class="resume-btn" onclick="togglePause()">RESUME</button>
    <button class="sound-btn" id="sound-toggle-btn" onclick="toggleSound()">SOUND: ON</button>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">FULLSCREEN</button>
    <button class="menu-btn" onclick="showStartScreen()">MENU</button>
</div>

<!-- ── Intro screen ── -->
<div id="intro-screen" class="overlay" style="display:none;">
    <canvas id="intro-canvas"></canvas>
</div>

<!-- ── Menu Step 2: Player Mode ── -->
<div id="menu-step-2" class="overlay menu-step" style="display:none;">
    <div class="step-header">
        <div class="step-title">LEGENDARY DESTRUCTION DERBY</div>
    </div>
    <h2 class="step-subtitle">Choose Your Mode</h2>
    <div class="menu-cards" id="player-mode-cards"></div>
    <div class="step-bottom-bar">
        <button class="hs-btn" onclick="showHighScoresModal()">HIGH SCORES</button>
        <button class="fullscreen-btn" onclick="toggleFullscreen()">FULLSCREEN</button>
    </div>
    <div class="step-dots" id="dots-step-2"></div>
</div>

<!-- ── Menu Step 3: Game Type ── -->
<div id="menu-step-3" class="overlay menu-step" style="display:none;">
    <div class="step-header">
        <button class="back-btn" onclick="navigateMenu(2)">&larr; BACK</button>
        <div class="step-title-sm">Game Type</div>
    </div>
    <div class="menu-cards menu-cards-wrap" id="game-mode-cards"></div>
    <div class="step-dots" id="dots-step-3"></div>
</div>

<!-- ── Menu Step 4: Car Select ── -->
<div id="menu-step-4" class="overlay menu-step" style="display:none;">
    <div class="step-header">
        <button class="back-btn" onclick="navigateMenu(3)">&larr; BACK</button>
        <div class="step-title-sm">Car Setup</div>
    </div>
    <div id="car-setup-panel"></div>
    <button class="next-btn" onclick="navigateMenu(5)">NEXT &rarr;</button>
    <div class="step-dots" id="dots-step-4"></div>
</div>

<!-- ── Menu Step 5: Map Select ── -->
<div id="menu-step-5" class="overlay menu-step" style="display:none;">
    <div class="step-header">
        <button class="back-btn" onclick="navigateMenu(4)">&larr; BACK</button>
        <div class="step-title-sm">Choose Arena</div>
    </div>
    <div class="menu-cards menu-cards-wrap" id="map-select-cards"></div>
    <button class="start-btn" onclick="startGame()">START</button>
    <div class="step-dots" id="dots-step-5"></div>
</div>

<!-- ── High Scores Modal ── -->
<div id="highscores-modal" class="overlay" style="display:none;">
    <div class="hs-modal-inner">
        <div class="hs-modal-header">
            <h2>HIGH SCORES</h2>
            <button class="hs-close-btn" onclick="hideHighScoresModal()">&times;</button>
        </div>
        <div class="hs-tabs" id="hs-tabs"></div>
        <div class="hs-body" id="hs-body"></div>
    </div>
</div>

<!-- ── Game over screen ── -->
<div id="game-over-screen" class="overlay">
    <h1 id="go-title">GAME OVER</h1>
    <div id="go-highscore-banner" style="display:none;"></div>
    <div id="game-over-stats"></div>
    <div id="go-leaderboard"></div>
    <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
        <button class="restart-btn" onclick="replayGame()">PLAY AGAIN</button>
        <button class="restart-btn" onclick="showHighScoresModal()">HIGH SCORES</button>
        <button class="restart-btn menu-btn-go" onclick="showStartScreen()">MENU</button>
    </div>
</div>

<!-- ── Scripts: loaded in dependency order ── -->
<script src="js/config.js"></script>
<script src="js/modes.js"></script>
<script src="js/cars.js"></script>
<script src="js/maps.js"></script>
<script src="js/maps/arena.js"></script>
<script src="js/maps/desert.js"></script>
<script src="js/maps/snow.js"></script>
<script src="js/maps/parking.js"></script>
<script src="js/maps/speedway.js"></script>
<script src="js/maps/kryspa.js"></script>
<script src="js/state.js"></script>
<script src="js/utils.js"></script>
<script src="js/audio.js"></script>
<script src="js/particles.js"></script>
<script src="js/scoring.js"></script>
<script src="js/highscores.js"></script>
<script src="js/physics.js"></script>
<script src="js/terrain.js"></script>
<script src="js/car-factory.js"></script>
<script src="js/powerups.js"></script>
<script src="js/player.js"></script>
<script src="js/ai.js"></script>
<script src="js/input.js"></script>
<script src="js/renderer.js"></script>
<script src="js/hud.js"></script>
<script src="js/ui.js"></script>
<script src="js/intro.js"></script>
<script src="js/game.js"></script>
</body>
</html>
