<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Intro Screen & Logo Mockups — Legendary Destruction Derby</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0a; color: #fff; font-family: 'Segoe UI', Arial, sans-serif; }
.mockup-label {
    text-align: center; padding: 18px 0 8px; font-size: 14px; color: #666;
    letter-spacing: 2px; text-transform: uppercase;
}
.mockup-label span { color: #ff6eb4; }
canvas { display: block; margin: 0 auto 0; cursor: pointer; }
.hint { text-align: center; color: #444; font-size: 11px; padding: 6px 0 30px; }
hr { border: none; border-top: 1px solid #1a1a1a; margin: 10px 100px; }
</style>
</head>
<body>

<div class="mockup-label"><span>OPTION A</span> — Chrome & Fire</div>
<canvas id="a" width="900" height="500"></canvas>
<div class="hint">Click the car to see the explosion</div>

<hr>

<div class="mockup-label"><span>OPTION B</span> — Neon Glow</div>
<canvas id="b" width="900" height="500"></canvas>
<div class="hint">Click the car to see the explosion</div>

<hr>

<div class="mockup-label"><span>OPTION C</span> — Grunge / Stamped</div>
<canvas id="c" width="900" height="500"></canvas>
<div class="hint">Click the car to see the explosion</div>

<hr>

<div class="mockup-label"><span>OPTION D</span> — Minimal Dark</div>
<canvas id="d" width="900" height="500"></canvas>
<div class="hint">Click the car to see the explosion</div>

<script>
// ═══════════════════════════════════════════════════════
// Shared: draw a car at (0,0) facing right
// ═══════════════════════════════════════════════════════
function drawCar(ctx, col, s, style) {
    ctx.save(); ctx.scale(s, s);
    let cw = 40, ch = 22;
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,.4)';
    ctx.fillRect(-cw/2+3, -ch/2+3, cw, ch);
    // Body
    ctx.fillStyle = col;
    ctx.beginPath(); ctx.roundRect(-cw/2, -ch/2, cw, ch, 4); ctx.fill();
    // Windshield
    ctx.fillStyle = 'rgba(100,180,255,.55)';
    ctx.fillRect(cw/2-14, -ch/2+3, 8, ch-6);
    // Rear
    ctx.fillStyle = 'rgba(0,0,0,.3)';
    ctx.fillRect(-cw/2, -ch/2+2, 8, ch-4);
    // Roof
    ctx.fillStyle = 'rgba(255,255,255,.22)';
    ctx.fillRect(-5, -2, 10, 4);
    // Headlights
    ctx.fillStyle = '#ffa';
    ctx.fillRect(cw/2-3, -ch/2+2, 3, 4);
    ctx.fillRect(cw/2-3, ch/2-6, 3, 4);
    // Taillights
    ctx.fillStyle = '#f00';
    ctx.fillRect(-cw/2, -ch/2+2, 3, 4);
    ctx.fillRect(-cw/2, ch/2-6, 3, 4);

    if (style === 'glow') {
        ctx.shadowColor = col; ctx.shadowBlur = 15;
        ctx.strokeStyle = col; ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.roundRect(-cw/2, -ch/2, cw, ch, 4); ctx.stroke();
        ctx.shadowBlur = 0;
    }
    ctx.restore();
}

// Shared: particle explosion
function explodeCar(cvs, cx, cy, col, afterFn) {
    let ctx = cvs.getContext('2d');
    let particles = [];
    let debris = [];
    for (let i = 0; i < 60; i++) {
        let a = Math.random() * Math.PI * 2, sp = 2 + Math.random() * 8;
        particles.push({
            x: cx, y: cy, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp,
            color: ['#f00','#f80','#ff0','#fff','#fa0'][Math.random()*5|0],
            size: 3 + Math.random() * 8, alpha: 1, decay: 0.01 + Math.random() * 0.02
        });
    }
    for (let i = 0; i < 30; i++) {
        let a = Math.random() * Math.PI * 2, sp = 1 + Math.random() * 4;
        particles.push({
            x: cx, y: cy, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp,
            color: '#333', size: 8 + Math.random() * 12, alpha: 0.8, decay: 0.008 + Math.random() * 0.01
        });
    }
    for (let i = 0; i < 15; i++) {
        let a = Math.random() * Math.PI * 2, sp = 2 + Math.random() * 6;
        debris.push({
            x: cx, y: cy, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp,
            angle: Math.random()*Math.PI*2, spin: (Math.random()-.5)*.3,
            size: 4+Math.random()*8, color: Math.random()<.5 ? col : '#444',
            alpha: 1
        });
    }
    let frame = 0;
    function tick() {
        frame++;
        // Don't clear — let it overlay on existing drawing for first frames
        if (frame > 3) {
            // Fade to black
            ctx.fillStyle = 'rgba(0,0,0,0.08)';
            ctx.fillRect(0, 0, cvs.width, cvs.height);
        }
        for (let p of particles) {
            p.x += p.vx; p.y += p.vy; p.vx *= 0.97; p.vy *= 0.97;
            p.alpha -= p.decay; p.size *= 0.99;
            if (p.alpha <= 0) continue;
            ctx.globalAlpha = p.alpha;
            ctx.fillStyle = p.color;
            ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
        }
        for (let d of debris) {
            d.x += d.vx; d.y += d.vy; d.vx *= 0.96; d.vy *= 0.96;
            d.angle += d.spin; d.alpha -= 0.012;
            if (d.alpha <= 0) continue;
            ctx.globalAlpha = d.alpha;
            ctx.save(); ctx.translate(d.x, d.y); ctx.rotate(d.angle);
            ctx.fillStyle = d.color;
            ctx.fillRect(-d.size/2, -d.size/2, d.size, d.size);
            ctx.restore();
        }
        ctx.globalAlpha = 1;
        if (frame < 120) requestAnimationFrame(tick);
        else if (afterFn) afterFn();
    }
    tick();
}

// ═══════════════════════════════════════════════════════
// OPTION A — Chrome & Fire
// ═══════════════════════════════════════════════════════
(function(){
    let cvs = document.getElementById('a');
    let ctx = cvs.getContext('2d');
    let carX = cvs.width/2, carY = cvs.height * 0.68;
    let exploded = false;

    function draw() {
        ctx.clearRect(0, 0, cvs.width, cvs.height);

        // Background — dark with subtle radial
        let bg = ctx.createRadialGradient(cvs.width/2, cvs.height/2, 0, cvs.width/2, cvs.height/2, 450);
        bg.addColorStop(0, '#1a1008');
        bg.addColorStop(1, '#080604');
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, cvs.width, cvs.height);

        // Fire glow behind text
        ctx.save();
        let fireGlow = ctx.createRadialGradient(cvs.width/2, 150, 20, cvs.width/2, 150, 300);
        fireGlow.addColorStop(0, 'rgba(255,100,0,.15)');
        fireGlow.addColorStop(0.5, 'rgba(255,60,0,.05)');
        fireGlow.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = fireGlow;
        ctx.fillRect(0, 0, cvs.width, cvs.height);
        ctx.restore();

        // "LEGENDARY" — large, gold/chrome gradient
        ctx.save();
        ctx.font = 'bold 72px Arial';
        ctx.textAlign = 'center';
        let goldGrad = ctx.createLinearGradient(cvs.width/2 - 250, 0, cvs.width/2 + 250, 0);
        goldGrad.addColorStop(0, '#b8860b');
        goldGrad.addColorStop(0.2, '#ffd700');
        goldGrad.addColorStop(0.4, '#fff8dc');
        goldGrad.addColorStop(0.5, '#ffd700');
        goldGrad.addColorStop(0.8, '#b8860b');
        goldGrad.addColorStop(1, '#daa520');
        ctx.fillStyle = goldGrad;
        // Shadow for emboss
        ctx.shadowColor = 'rgba(0,0,0,.8)'; ctx.shadowBlur = 8; ctx.shadowOffsetY = 4;
        ctx.fillText('LEGENDARY', cvs.width/2, 120);
        ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;
        // Bright edge on top
        ctx.globalAlpha = 0.3;
        ctx.fillStyle = '#fff';
        ctx.fillText('LEGENDARY', cvs.width/2, 119);
        ctx.globalAlpha = 1;
        ctx.restore();

        // "DESTRUCTION DERBY" — chrome/silver with red tint
        ctx.save();
        ctx.font = 'bold 46px Arial';
        ctx.textAlign = 'center';
        let chromeGrad = ctx.createLinearGradient(0, 145, 0, 200);
        chromeGrad.addColorStop(0, '#ff6030');
        chromeGrad.addColorStop(0.3, '#ffaa60');
        chromeGrad.addColorStop(0.5, '#fff');
        chromeGrad.addColorStop(0.7, '#ffaa60');
        chromeGrad.addColorStop(1, '#cc4020');
        ctx.fillStyle = chromeGrad;
        ctx.shadowColor = 'rgba(255,60,0,.5)'; ctx.shadowBlur = 15;
        ctx.fillText('DESTRUCTION DERBY', cvs.width/2, 190);
        ctx.shadowBlur = 0;
        ctx.restore();

        // Divider line
        ctx.strokeStyle = 'rgba(255,150,50,.3)'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(cvs.width/2 - 200, 210); ctx.lineTo(cvs.width/2 + 200, 210); ctx.stroke();

        // Car
        if (!exploded) {
            ctx.save();
            ctx.translate(carX, carY);
            drawCar(ctx, '#ff6eb4', 3, '');
            ctx.restore();

            // "Click to start" pulse
            ctx.globalAlpha = 0.5 + Math.sin(Date.now() * 0.004) * 0.3;
            ctx.fillStyle = '#888';
            ctx.font = '14px Arial'; ctx.textAlign = 'center';
            ctx.fillText('CLICK THE CAR TO START', cvs.width/2, carY + 55);
            ctx.globalAlpha = 1;

            // Ground reflection hint
            ctx.save();
            ctx.globalAlpha = 0.1;
            ctx.translate(carX, carY + 70);
            ctx.scale(1, -0.4);
            drawCar(ctx, '#ff6eb4', 3, '');
            ctx.restore();
        }
    }

    function animate() { if (!exploded) { draw(); requestAnimationFrame(animate); } }
    animate();

    cvs.onclick = function(e) {
        let r = cvs.getBoundingClientRect();
        let mx = (e.clientX - r.left) * (cvs.width / r.width);
        let my = (e.clientY - r.top) * (cvs.height / r.height);
        if (Math.abs(mx - carX) < 70 && Math.abs(my - carY) < 40 && !exploded) {
            exploded = true;
            explodeCar(cvs, carX, carY, '#ff6eb4');
        }
    };
})();

// ═══════════════════════════════════════════════════════
// OPTION B — Neon Glow
// ═══════════════════════════════════════════════════════
(function(){
    let cvs = document.getElementById('b');
    let ctx = cvs.getContext('2d');
    let carX = cvs.width/2, carY = cvs.height * 0.68;
    let exploded = false;

    function draw() {
        ctx.clearRect(0, 0, cvs.width, cvs.height);

        // Dark bg with blue tint
        let bg = ctx.createRadialGradient(cvs.width/2, cvs.height/2, 0, cvs.width/2, cvs.height/2, 500);
        bg.addColorStop(0, '#0a0a1a');
        bg.addColorStop(1, '#050508');
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, cvs.width, cvs.height);

        // Grid floor lines (perspective)
        ctx.strokeStyle = 'rgba(110,180,255,.06)'; ctx.lineWidth = 1;
        for (let i = 0; i < 20; i++) {
            let y = 250 + i * 15;
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(cvs.width, y); ctx.stroke();
        }
        for (let i = -10; i < 10; i++) {
            let x = cvs.width/2 + i * 60;
            ctx.beginPath(); ctx.moveTo(x, 250); ctx.lineTo(cvs.width/2 + i*20, cvs.height); ctx.stroke();
        }

        // "LEGENDARY" — neon pink
        ctx.save();
        ctx.font = 'bold 68px Arial'; ctx.textAlign = 'center';
        ctx.shadowColor = '#ff6eb4'; ctx.shadowBlur = 30;
        ctx.fillStyle = '#ff6eb4';
        ctx.fillText('LEGENDARY', cvs.width/2, 115);
        ctx.shadowBlur = 60;
        ctx.globalAlpha = 0.3;
        ctx.fillText('LEGENDARY', cvs.width/2, 115);
        ctx.globalAlpha = 1; ctx.shadowBlur = 0;
        ctx.restore();

        // "DESTRUCTION DERBY" — neon blue
        ctx.save();
        ctx.font = 'bold 42px Arial'; ctx.textAlign = 'center';
        ctx.shadowColor = '#6eb4ff'; ctx.shadowBlur = 25;
        ctx.fillStyle = '#6eb4ff';
        ctx.fillText('DESTRUCTION DERBY', cvs.width/2, 175);
        ctx.shadowBlur = 50;
        ctx.globalAlpha = 0.3;
        ctx.fillText('DESTRUCTION DERBY', cvs.width/2, 175);
        ctx.globalAlpha = 1; ctx.shadowBlur = 0;
        ctx.restore();

        // Neon divider
        ctx.strokeStyle = '#ff6eb4'; ctx.lineWidth = 2;
        ctx.shadowColor = '#ff6eb4'; ctx.shadowBlur = 10;
        ctx.beginPath(); ctx.moveTo(cvs.width/2 - 180, 198); ctx.lineTo(cvs.width/2 + 180, 198); ctx.stroke();
        ctx.shadowBlur = 0;

        if (!exploded) {
            // Car with neon glow underneath
            ctx.save();
            ctx.fillStyle = 'rgba(110,180,255,.08)';
            ctx.beginPath(); ctx.ellipse(carX, carY + 20, 80, 15, 0, 0, Math.PI*2); ctx.fill();
            ctx.translate(carX, carY);
            drawCar(ctx, '#6eb4ff', 3, 'glow');
            ctx.restore();

            ctx.globalAlpha = 0.5 + Math.sin(Date.now() * 0.004) * 0.3;
            ctx.fillStyle = '#6eb4ff';
            ctx.shadowColor = '#6eb4ff'; ctx.shadowBlur = 8;
            ctx.font = '14px Arial'; ctx.textAlign = 'center';
            ctx.fillText('CLICK THE CAR TO START', cvs.width/2, carY + 55);
            ctx.shadowBlur = 0;
            ctx.globalAlpha = 1;
        }
    }

    function animate() { if (!exploded) { draw(); requestAnimationFrame(animate); } }
    animate();

    cvs.onclick = function(e) {
        let r = cvs.getBoundingClientRect();
        let mx = (e.clientX - r.left) * (cvs.width / r.width);
        let my = (e.clientY - r.top) * (cvs.height / r.height);
        if (Math.abs(mx - carX) < 70 && Math.abs(my - carY) < 40 && !exploded) {
            exploded = true;
            explodeCar(cvs, carX, carY, '#6eb4ff');
        }
    };
})();

// ═══════════════════════════════════════════════════════
// OPTION C — Grunge / Stamped
// ═══════════════════════════════════════════════════════
(function(){
    let cvs = document.getElementById('c');
    let ctx = cvs.getContext('2d');
    let carX = cvs.width/2, carY = cvs.height * 0.68;
    let exploded = false;

    // Pre-generate noise texture
    let noiseCanvas = document.createElement('canvas');
    noiseCanvas.width = cvs.width; noiseCanvas.height = cvs.height;
    let nctx = noiseCanvas.getContext('2d');
    let imgData = nctx.createImageData(cvs.width, cvs.height);
    for (let i = 0; i < imgData.data.length; i += 4) {
        let v = Math.random() * 30;
        imgData.data[i] = v; imgData.data[i+1] = v; imgData.data[i+2] = v; imgData.data[i+3] = 40;
    }
    nctx.putImageData(imgData, 0, 0);

    function draw() {
        ctx.clearRect(0, 0, cvs.width, cvs.height);

        // Concrete/dark bg
        ctx.fillStyle = '#121210';
        ctx.fillRect(0, 0, cvs.width, cvs.height);
        ctx.drawImage(noiseCanvas, 0, 0);

        // Scratched lines
        ctx.strokeStyle = 'rgba(255,255,255,.03)'; ctx.lineWidth = 1;
        for (let i = 0; i < 30; i++) {
            let x1 = Math.random() * cvs.width, y1 = Math.random() * cvs.height;
            ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x1 + (Math.random()-.5)*200, y1 + (Math.random()-.5)*40); ctx.stroke();
        }

        // Yellow caution stripe at top and bottom
        ctx.fillStyle = '#cc9900';
        for (let x = 0; x < cvs.width; x += 40) {
            if ((x / 40 | 0) % 2 === 0) {
                ctx.fillRect(x, 0, 20, 6);
                ctx.fillRect(x, cvs.height - 6, 20, 6);
            }
        }
        ctx.fillStyle = '#111';
        for (let x = 0; x < cvs.width; x += 40) {
            if ((x / 40 | 0) % 2 !== 0) {
                ctx.fillRect(x, 0, 20, 6);
                ctx.fillRect(x, cvs.height - 6, 20, 6);
            }
        }

        // "LEGENDARY" — stamped/embossed look
        ctx.save();
        ctx.font = 'bold 76px Arial'; ctx.textAlign = 'center';
        // Emboss shadow
        ctx.fillStyle = 'rgba(0,0,0,.8)';
        ctx.fillText('LEGENDARY', cvs.width/2 + 3, 123);
        // Main text — rough yellow
        ctx.fillStyle = '#ccaa30';
        ctx.fillText('LEGENDARY', cvs.width/2, 120);
        // Highlight edge
        ctx.globalAlpha = 0.2;
        ctx.fillStyle = '#fff';
        ctx.fillText('LEGENDARY', cvs.width/2 - 1, 119);
        ctx.globalAlpha = 1;
        ctx.restore();

        // "DESTRUCTION DERBY" — red/distressed
        ctx.save();
        ctx.font = 'bold 44px Arial'; ctx.textAlign = 'center';
        ctx.fillStyle = 'rgba(0,0,0,.7)';
        ctx.fillText('DESTRUCTION DERBY', cvs.width/2 + 2, 182);
        ctx.fillStyle = '#cc3322';
        ctx.fillText('DESTRUCTION DERBY', cvs.width/2, 180);
        ctx.restore();

        // Divider — tire marks
        ctx.strokeStyle = 'rgba(40,40,40,.6)'; ctx.lineWidth = 8;
        ctx.setLineDash([15, 10]);
        ctx.beginPath(); ctx.moveTo(cvs.width/2 - 220, 205); ctx.lineTo(cvs.width/2 + 220, 205); ctx.stroke();
        ctx.setLineDash([]);

        if (!exploded) {
            // Skid marks leading to car
            ctx.strokeStyle = 'rgba(30,30,30,.4)'; ctx.lineWidth = 4; ctx.lineCap = 'round';
            ctx.beginPath(); ctx.moveTo(carX - 150, carY + 15); ctx.quadraticCurveTo(carX - 60, carY + 10, carX - 30, carY - 5); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(carX - 140, carY - 15); ctx.quadraticCurveTo(carX - 50, carY - 10, carX - 25, carY + 5); ctx.stroke();

            ctx.save();
            ctx.translate(carX, carY);
            drawCar(ctx, '#e03030', 3, '');
            ctx.restore();

            ctx.globalAlpha = 0.5 + Math.sin(Date.now() * 0.004) * 0.3;
            ctx.fillStyle = '#aa8830';
            ctx.font = 'bold 14px Arial'; ctx.textAlign = 'center';
            ctx.fillText('CLICK THE CAR TO START', cvs.width/2, carY + 55);
            ctx.globalAlpha = 1;
        }
    }

    function animate() { if (!exploded) { draw(); requestAnimationFrame(animate); } }
    animate();

    cvs.onclick = function(e) {
        let r = cvs.getBoundingClientRect();
        let mx = (e.clientX - r.left) * (cvs.width / r.width);
        let my = (e.clientY - r.top) * (cvs.height / r.height);
        if (Math.abs(mx - carX) < 70 && Math.abs(my - carY) < 40 && !exploded) {
            exploded = true;
            explodeCar(cvs, carX, carY, '#e03030');
        }
    };
})();

// ═══════════════════════════════════════════════════════
// OPTION D — Minimal Dark
// ═══════════════════════════════════════════════════════
(function(){
    let cvs = document.getElementById('d');
    let ctx = cvs.getContext('2d');
    let carX = cvs.width/2, carY = cvs.height * 0.68;
    let exploded = false;

    function draw() {
        ctx.clearRect(0, 0, cvs.width, cvs.height);

        // Pure black
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, cvs.width, cvs.height);

        // Subtle spotlight
        let spot = ctx.createRadialGradient(cvs.width/2, cvs.height/2 + 50, 0, cvs.width/2, cvs.height/2, 400);
        spot.addColorStop(0, 'rgba(255,255,255,.04)');
        spot.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = spot;
        ctx.fillRect(0, 0, cvs.width, cvs.height);

        // "LEGENDARY" — clean white, wide letter-spacing
        ctx.save();
        ctx.font = '200 64px Arial'; ctx.textAlign = 'center'; ctx.letterSpacing = '12px';
        ctx.fillStyle = '#fff';
        ctx.fillText('L E G E N D A R Y', cvs.width/2, 115);
        ctx.restore();

        // "DESTRUCTION DERBY" — gradient pink→blue (same as current game)
        ctx.save();
        ctx.font = 'bold 48px Arial'; ctx.textAlign = 'center';
        let grad = ctx.createLinearGradient(cvs.width/2 - 250, 0, cvs.width/2 + 250, 0);
        grad.addColorStop(0, '#ff6eb4');
        grad.addColorStop(1, '#6eb4ff');
        ctx.fillStyle = grad;
        ctx.fillText('DESTRUCTION DERBY', cvs.width/2, 185);
        ctx.restore();

        // Thin gradient line
        let lineGrad = ctx.createLinearGradient(cvs.width/2 - 200, 0, cvs.width/2 + 200, 0);
        lineGrad.addColorStop(0, 'rgba(255,110,180,0)');
        lineGrad.addColorStop(0.3, 'rgba(255,110,180,.5)');
        lineGrad.addColorStop(0.7, 'rgba(110,180,255,.5)');
        lineGrad.addColorStop(1, 'rgba(110,180,255,0)');
        ctx.strokeStyle = lineGrad; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(cvs.width/2 - 200, 203); ctx.lineTo(cvs.width/2 + 200, 203); ctx.stroke();

        if (!exploded) {
            // Soft glow under car
            let carGlow = ctx.createRadialGradient(carX, carY + 10, 0, carX, carY + 10, 80);
            carGlow.addColorStop(0, 'rgba(255,110,180,.06)');
            carGlow.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = carGlow;
            ctx.fillRect(0, 0, cvs.width, cvs.height);

            ctx.save();
            ctx.translate(carX, carY);
            drawCar(ctx, '#ff6eb4', 3, '');
            ctx.restore();

            // Subtle reflection
            ctx.save();
            ctx.globalAlpha = 0.07;
            ctx.translate(carX, carY + 65);
            ctx.scale(1, -0.35);
            drawCar(ctx, '#ff6eb4', 3, '');
            ctx.restore();

            ctx.globalAlpha = 0.35 + Math.sin(Date.now() * 0.003) * 0.2;
            ctx.fillStyle = '#555';
            ctx.font = '13px Arial'; ctx.textAlign = 'center';
            ctx.fillText('CLICK THE CAR TO START', cvs.width/2, carY + 55);
            ctx.globalAlpha = 1;
        }
    }

    function animate() { if (!exploded) { draw(); requestAnimationFrame(animate); } }
    animate();

    cvs.onclick = function(e) {
        let r = cvs.getBoundingClientRect();
        let mx = (e.clientX - r.left) * (cvs.width / r.width);
        let my = (e.clientY - r.top) * (cvs.height / r.height);
        if (Math.abs(mx - carX) < 70 && Math.abs(my - carY) < 40 && !exploded) {
            exploded = true;
            explodeCar(cvs, carX, carY, '#ff6eb4');
        }
    };
})();
</script>
</body>
</html>
