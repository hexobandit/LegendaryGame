<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Car Variants Mockup — Legendary Destruction Derby</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; color: #eee; font-family: 'Segoe UI', Arial, sans-serif; overflow-x: hidden; }
h1 { text-align: center; padding: 24px 0 8px; font-size: 28px; color: #ffd700; text-shadow: 0 0 12px rgba(255,215,0,.4); }
.subtitle { text-align: center; color: #aaa; font-size: 14px; margin-bottom: 20px; }

/* Interactive demo area */
#demo-area { position: relative; margin: 0 auto 30px; }
#demoCanvas { display: block; margin: 0 auto; border: 2px solid #333; border-radius: 8px; cursor: crosshair; }
.demo-controls { text-align: center; padding: 10px; color: #888; font-size: 13px; }
.demo-controls b { color: #ffd700; }

/* Category sections */
.category { max-width: 1200px; margin: 0 auto 30px; padding: 0 20px; }
.cat-title { font-size: 20px; color: #ffd700; border-bottom: 2px solid #333; padding-bottom: 6px; margin-bottom: 16px; }
.car-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
.car-card {
    background: #16213e; border: 1px solid #333; border-radius: 10px; padding: 16px;
    transition: border-color 0.2s, transform 0.2s;
}
.car-card:hover { border-color: #ffd700; transform: translateY(-2px); }
.car-card.new-car { border-color: #4a4; }
.car-card.new-car::after {
    content: 'NEW'; position: absolute; top: 8px; right: 8px;
    background: #4a4; color: #fff; font-size: 10px; font-weight: bold;
    padding: 2px 6px; border-radius: 4px;
}
.car-card { position: relative; }
.car-preview { text-align: center; margin-bottom: 10px; }
.car-preview canvas { image-rendering: pixelated; }
.car-name { font-size: 16px; font-weight: bold; color: #fff; }
.car-desc { font-size: 12px; color: #999; margin: 4px 0 10px; }
.car-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 10px; }
.tag {
    font-size: 10px; font-weight: bold; padding: 2px 6px; border-radius: 3px;
    text-transform: uppercase;
}
.tag-fast { background: #1a4a4a; color: #4ff; }
.tag-heavy { background: #4a1a1a; color: #f66; }
.tag-agile { background: #1a4a1a; color: #6f6; }
.tag-armored { background: #3a3a1a; color: #ff4; }
.tag-fragile { background: #4a2a1a; color: #fa6; }
.tag-huge { background: #2a1a4a; color: #a6f; }
.tag-tiny { background: #1a3a4a; color: #6af; }
.tag-grip { background: #2a4a2a; color: #afa; }

/* Stat bars */
.stats { display: grid; grid-template-columns: 50px 1fr 30px; gap: 3px; align-items: center; font-size: 11px; }
.stat-label { color: #888; text-align: right; padding-right: 6px; }
.stat-bar { height: 6px; background: #0a0a1e; border-radius: 3px; overflow: hidden; }
.stat-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
.stat-val { color: #666; font-size: 10px; }

/* Comparison section */
.comparison { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
.comp-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.comp-table th { text-align: left; color: #ffd700; padding: 6px 8px; border-bottom: 2px solid #333; }
.comp-table td { padding: 5px 8px; border-bottom: 1px solid #222; }
.comp-table tr:hover td { background: rgba(255,215,0,0.05); }
.comp-bar { display: inline-block; height: 8px; border-radius: 4px; vertical-align: middle; margin-right: 4px; }
</style>
</head>
<body>

<h1>Vehicle Roster — All Variants</h1>
<p class="subtitle">WASD to drive, SPACE for nitro. Click a car card to switch vehicle in the demo.</p>

<div id="demo-area">
    <canvas id="demoCanvas" width="900" height="400"></canvas>
    <div class="demo-controls">
        <b>WASD</b> Drive &nbsp;|&nbsp; <b>SPACE</b> Nitro &nbsp;|&nbsp;
        <b>Click card</b> Switch car &nbsp;|&nbsp;
        Current: <span id="current-car" style="color:#ffd700">Stock</span>
    </div>
</div>

<div class="category">
    <div class="cat-title">Existing Vehicles</div>
    <div class="car-grid" id="existing-cars"></div>
</div>

<div class="category">
    <div class="cat-title">New Vehicles</div>
    <div class="car-grid" id="new-cars"></div>
</div>

<div class="comparison">
    <div class="cat-title">Full Comparison</div>
    <table class="comp-table" id="comp-table"></table>
</div>

<script>
// ════════════════════════════════════════════════════════════════
//  ALL CAR TYPES — existing + new
// ════════════════════════════════════════════════════════════════
const ALL_CARS = [
    // ── EXISTING ──
    {
        id: 'normal', name: 'Stock', isNew: false,
        description: 'Balanced all-rounder. No surprises, just solid.',
        bodyStyle: 'sedan', width: 40, height: 22,
        hp: 100, mass: 1.0, maxSpeedMult: 1.0, accelMult: 1.0, turnMult: 1.0,
        collisionDmgMult: 1.0, gripBonus: 0.0,
        tags: [],
    },
    {
        id: 'sport', name: 'Speedster', isNew: false,
        description: 'Fast and agile, but fragile. Hit hard, don\'t get hit.',
        bodyStyle: 'sport', width: 40, height: 22,
        hp: 80, mass: 0.8, maxSpeedMult: 1.25, accelMult: 1.15, turnMult: 1.1,
        collisionDmgMult: 1.0, gripBonus: 0.02,

    {

        bodyStyle: 'truck', width: 40, height: 22,
        hp: 180, mass: 1.8, maxSpeedMult: 0.7, accelMult: 0.75, turnMult: 0.7,

    },
    {

        bodyStyle: 'truck_heavy', width: 42, height: 24,
        hp: 150, mass: 1.6, maxSpeedMult: 0.78, accelMult: 0.82, turnMult: 0.75,

    },

    },

    // ── NEW ──
    {
        id: 'jeep', name: 'Jeep', isNew: true,

        bodyStyle: 'jeep', width: 40, height: 24,
        hp: 130, mass: 1.3, maxSpeedMult: 0.88, accelMult: 0.95, turnMult: 0.9,
        collisionDmgMult: 1.2, gripBonus: 0.05,
        tags: ['heavy', 'grip'],
    },
    {
        id: 'pickup', name: 'Ram', isNew: true,
        description: 'Beefy pickup. Heavy rear end swings wide on turns.',
        bodyStyle: 'pickup', width: 44, height: 24,
        hp: 160, mass: 1.7, maxSpeedMult: 0.82, accelMult: 0.85, turnMult: 0.72,
        collisionDmgMult: 1.5, gripBonus: -0.01,
        tags: ['heavy', 'armored'],
    },
    {
        id: 'roadster', name: 'Z4', isNew: true,
        description: 'Sleek roadster. Blazing speed, razor handling, paper-thin.',
        bodyStyle: 'roadster', width: 40, height: 20,
        hp: 75, mass: 0.75, maxSpeedMult: 1.3, accelMult: 1.2, turnMult: 1.15,
        collisionDmgMult: 0.9, gripBonus: 0.03,
        tags: ['fast', 'agile', 'fragile', 'grip'],
    },
    {
        id: 'miata', name: 'Miata', isNew: true,
        description: 'Lightweight funster. Impossible to catch in tight spaces.',
        bodyStyle: 'miata', width: 36, height: 19,
        hp: 72, mass: 0.65, maxSpeedMult: 1.15, accelMult: 1.18, turnMult: 1.35,
        collisionDmgMult: 0.85, gripBonus: 0.06,
        tags: ['tiny', 'fast', 'agile', 'fragile', 'grip'],
    },
    {
        id: 'monster', name: 'Monster Truck', isNew: true,
        description: 'Massive wheels. Crushes anything it drives over.',
        bodyStyle: 'monster', width: 48, height: 30,
        hp: 200, mass: 2.2, maxSpeedMult: 0.65, accelMult: 0.7, turnMult: 0.6,
        collisionDmgMult: 2.0, gripBonus: 0.02,
        tags: ['huge', 'heavy', 'armored'],
    },
    {
        id: 'schoolbus', name: 'School Bus', isNew: true,
        description: 'Enormous and slow. Impossible to stop once moving.',
        bodyStyle: 'schoolbus', width: 56, height: 22,
        hp: 250, mass: 2.5, maxSpeedMult: 0.5, accelMult: 0.45, turnMult: 0.4,
        collisionDmgMult: 2.2, gripBonus: -0.06,
        tags: ['huge', 'heavy', 'armored'],
    },
];

// ════════════════════════════════════════════════════════════════
//  DRAW CAR — renders any body style at any scale
// ════════════════════════════════════════════════════════════════
function drawCarBody(c, cw, ch, bodyStyle, color, scale) {
    c.save();
    if (scale) c.scale(scale, scale);

    var col = color || '#ff6eb4';

    // Shadow
    var shadowOff = ['suv','truck_heavy','warrig','jeep','pickup','monster','schoolbus'].includes(bodyStyle) ? 5 : 3;
    c.fillStyle = 'rgba(0,0,0,.3)';
    c.fillRect(-cw/2 + shadowOff, -ch/2 + shadowOff, cw, ch);

    // Body
    var cr = ['compact','miata'].includes(bodyStyle) ? 8 : bodyStyle === 'roadster' ? 6 : bodyStyle === 'schoolbus' ? 3 : 4;
    c.fillStyle = col;
    c.beginPath(); c.roundRect(-cw/2, -ch/2, cw, ch, cr); c.fill();

    // Windshield
    c.fillStyle = 'rgba(100,180,255,.55)';
    if (bodyStyle === 'sport' || bodyStyle === 'roadster') {
        c.fillRect(cw/2 - 14, -ch/2 + 5, 8, ch - 10);
    } else if (bodyStyle === 'schoolbus') {
        c.fillRect(cw/2 - 10, -ch/2 + 2, 6, ch - 4);
    } else {
        c.fillRect(cw/2 - 14, -ch/2 + 3, 8, ch - 6);
    }

    // Rear
    c.fillStyle = 'rgba(0,0,0,.3)';
    c.fillRect(-cw/2, -ch/2 + 2, 8, ch - 4);

    // Roof stripe (not on bus/monster)
    if (!['schoolbus','monster'].includes(bodyStyle)) {
        c.fillStyle = 'rgba(255,255,255,.22)';
        c.fillRect(-5, -2, 10, 4);
    }

    // Headlights
    c.fillStyle = '#ffa';
    c.fillRect(cw/2 - 3, -ch/2 + 2, 3, 4);
    c.fillRect(cw/2 - 3, ch/2 - 6, 3, 4);
    // Tail lights
    c.fillStyle = '#f00';
    c.fillRect(-cw/2, -ch/2 + 2, 3, 4);
    c.fillRect(-cw/2, ch/2 - 6, 3, 4);

    // ── Body-specific details ──
    if (bodyStyle === 'sport') {
        // Racing stripe
        c.save();
        c.beginPath(); c.roundRect(-cw/2, -ch/2, cw, ch, 4); c.clip();
        c.fillStyle = 'rgba(255,255,255,.2)';
        c.beginPath();
        c.moveTo(-5, -ch/2); c.lineTo(10, -ch/2);
        c.lineTo(-5, ch/2); c.lineTo(-20, ch/2);
        c.closePath(); c.fill();
        c.restore();
        // Number circle
        c.fillStyle = '#fff';
        c.beginPath(); c.arc(0, 0, 5, 0, Math.PI*2); c.fill();
        c.fillStyle = '#111'; c.font = 'bold 7px Arial'; c.textAlign = 'center';
        c.fillText('7', 0.5, 2.5);
        // Wing spoiler
        c.fillStyle = '#222';
        c.fillRect(-cw/2 - 3, -ch/2 - 1.5, 8, ch + 3);
        c.fillStyle = col;
        c.fillRect(-cw/2 - 4, -ch/2 - 3, 10, 3);
        c.fillRect(-cw/2 - 4, ch/2, 10, 3);
        // Twin exhaust
        c.fillStyle = '#f80'; c.globalAlpha = 0.5;
        c.beginPath(); c.arc(-cw/2 - 2, -4, 3, 0, Math.PI*2); c.fill();
        c.beginPath(); c.arc(-cw/2 - 2, 4, 3, 0, Math.PI*2); c.fill();
        c.globalAlpha = 1;
        c.fillStyle = '#444';
        c.beginPath(); c.arc(-cw/2 - 1, -4, 1.8, 0, Math.PI*2); c.fill();
        c.beginPath(); c.arc(-cw/2 - 1, 4, 1.8, 0, Math.PI*2); c.fill();

    } else if (bodyStyle === 'suv') {
        // Roof rack
        c.fillStyle = '#888';
        c.fillRect(-cw/4 - 1, -ch/2 - 2, cw/2 + 2, 2.5);
        c.fillRect(-cw/4 - 1, ch/2 - 0.5, cw/2 + 2, 2.5);
        c.fillRect(-cw/6 - 0.5, -ch/2 - 2, 2, ch + 4);
        c.fillRect(cw/6 - 0.5, -ch/2 - 2, 2, ch + 4);
        // Fenders
        c.fillStyle = 'rgba(0,0,0,.35)';
        c.fillRect(cw/2 - 5, -ch/2 - 1.5, 6, 2);
        c.fillRect(cw/2 - 5, ch/2 - 0.5, 6, 2);
        c.fillRect(-cw/2 - 1, -ch/2 - 1.5, 6, 2);
        c.fillRect(-cw/2 - 1, ch/2 - 0.5, 6, 2);

    } else if (bodyStyle === 'truck') {
        // Bull bar
        c.strokeStyle = 'rgba(200,200,200,.7)'; c.lineWidth = 2.5;
        c.beginPath();
        c.moveTo(cw/2 + 2, -ch/2 + 1); c.lineTo(cw/2 + 4, -ch/2 + 1);
        c.lineTo(cw/2 + 4, ch/2 - 1); c.lineTo(cw/2 + 2, ch/2 - 1);
        c.stroke();
        c.beginPath(); c.moveTo(cw/2, 0); c.lineTo(cw/2 + 4, 0); c.stroke();

    } else if (bodyStyle === 'truck_heavy') {
        // Heavy ram bar
        c.fillStyle = '#999'; c.fillRect(cw/2, -ch/2, 5, ch);
        c.fillStyle = '#bbb'; c.fillRect(cw/2 + 1, -ch/2 + 1, 3, ch - 2);
        c.fillStyle = '#777'; c.fillRect(cw/2, -2, 5, 4);
        // Exhaust stacks
        c.fillStyle = '#555';
        c.fillRect(-2, -ch/2 - 4, 3, 5); c.fillRect(-2, ch/2 - 1, 3, 5);
        c.fillStyle = '#333';
        c.beginPath(); c.arc(-0.5, -ch/2 - 4, 1.5, 0, Math.PI*2); c.fill();
        c.beginPath(); c.arc(-0.5, ch/2 + 4, 1.5, 0, Math.PI*2); c.fill();
        c.fillStyle = 'rgba(100,100,100,.3)';
        c.beginPath(); c.arc(-0.5, -ch/2 - 7, 2.5, 0, Math.PI*2); c.fill();
        c.beginPath(); c.arc(-0.5, ch/2 + 7, 2.5, 0, Math.PI*2); c.fill();

    } else if (bodyStyle === 'warrig') {
        // V-plow
        c.fillStyle = '#aaa';
        c.beginPath(); c.moveTo(cw/2 + 7, 0); c.lineTo(cw/2, -ch/2 - 1); c.lineTo(cw/2, ch/2 + 1);
        c.closePath(); c.fill();
        c.fillStyle = '#888';
        c.beginPath(); c.moveTo(cw/2 + 6, 0); c.lineTo(cw/2 + 1, -ch/2 + 1); c.lineTo(cw/2 + 1, ch/2 - 1);
        c.closePath(); c.fill();
        // Warning stripes
        c.save();
        c.beginPath(); c.rect(-cw/2, -ch/2, cw/3, ch); c.clip();
        c.fillStyle = 'rgba(0,0,0,.25)';
        for (let i = -30; i < 30; i += 6) { c.save(); c.translate(i, 0); c.rotate(0.7); c.fillRect(-1.5, -20, 3, 40); c.restore(); }
        c.restore();
        // Armor plates
        c.fillStyle = 'rgba(80,80,80,.5)';
        c.fillRect(-cw/4, -ch/2 - 2, cw/2, 2.5);
        c.fillRect(-cw/4, ch/2 - 0.5, cw/2, 2.5);
        // Exhaust stacks
        c.fillStyle = '#555';
        c.fillRect(2, -ch/2 - 3, 2.5, 4); c.fillRect(2, ch/2 - 1, 2.5, 4);

    } else if (bodyStyle === 'compact') {
        // Cover default elements
        c.fillStyle = col;
        c.fillRect(cw/2 - 15, -ch/2 + 2, 12, ch - 4);
        c.fillRect(-cw/2, -ch/2 + 1, 4, 5); c.fillRect(-cw/2, ch/2 - 6, 4, 5);
        // Dome windshield
        c.fillStyle = 'rgba(120,200,255,.5)';
        c.beginPath(); c.arc(4, 0, 8, -1.3, 1.3); c.fill();
        c.strokeStyle = 'rgba(200,240,255,.3)'; c.lineWidth = 0.5;
        c.beginPath(); c.arc(4, 0, 8, -1.3, 1.3); c.stroke();
        // Round headlights
        c.fillStyle = '#ffa';
        c.beginPath(); c.arc(cw/2 - 1, -ch/2 + 4, 3, 0, Math.PI*2); c.fill();
        c.beginPath(); c.arc(cw/2 - 1, ch/2 - 4, 3, 0, Math.PI*2); c.fill();
        c.fillStyle = '#fff';
        c.beginPath(); c.arc(cw/2, -ch/2 + 3.5, 1, 0, Math.PI*2); c.fill();
        c.beginPath(); c.arc(cw/2, ch/2 - 3.5, 1, 0, Math.PI*2); c.fill();
        // Round tail lights
        c.fillStyle = '#f44';
        c.beginPath(); c.arc(-cw/2 + 1, -ch/2 + 4, 2.5, 0, Math.PI*2); c.fill();
        c.beginPath(); c.arc(-cw/2 + 1, ch/2 - 4, 2.5, 0, Math.PI*2); c.fill();
        // Number circle
        c.fillStyle = '#fff';
        c.beginPath(); c.arc(-2, 0, 4.5, 0, Math.PI*2); c.fill();
        c.fillStyle = '#111'; c.font = 'bold 6px Arial'; c.textAlign = 'center';
        c.fillText('3', -1.5, 2.2);

    } else if (bodyStyle === 'jeep') {
        // ── JEEP — boxy off-roader with spare tire + snorkel ──
        // Boxy fender flares (chunky wheel arches)
        c.fillStyle = '#222';
        c.fillRect(cw/2 - 7, -ch/2 - 2, 8, 4);   // front-left
        c.fillRect(cw/2 - 7, ch/2 - 2, 8, 4);     // front-right
        c.fillRect(-cw/2 - 1, -ch/2 - 2, 8, 4);   // rear-left
        c.fillRect(-cw/2 - 1, ch/2 - 2, 8, 4);     // rear-right
        // Flat grille — 5 vertical slots
        c.fillStyle = '#333';
        c.fillRect(cw/2 - 2, -ch/2 + 3, 3, ch - 6);
        for (let i = 0; i < 5; i++) {
            var sy = -ch/2 + 4 + i * ((ch - 8) / 5);
            c.fillStyle = '#111';
            c.fillRect(cw/2 - 1, sy, 2, 2);
        }
        // Snorkel — vertical pipe on one side
        c.fillStyle = '#444';
        c.fillRect(cw/4, -ch/2 - 4, 2, 6);
        c.fillRect(cw/4 - 1, -ch/2 - 5, 4, 2);
        // Spare tire on rear
        c.fillStyle = '#222';
        c.beginPath(); c.arc(-cw/2 - 3, 0, 5.5, 0, Math.PI*2); c.fill();
        c.fillStyle = '#444';
        c.beginPath(); c.arc(-cw/2 - 3, 0, 3.5, 0, Math.PI*2); c.fill();
        c.fillStyle = '#333';
        c.beginPath(); c.arc(-cw/2 - 3, 0, 1.5, 0, Math.PI*2); c.fill();
        // Roof light bar
        c.fillStyle = '#ff8';
        c.globalAlpha = 0.6;
        for (let i = 0; i < 4; i++) {
            c.beginPath(); c.arc(-2 + i * 4, -ch/2 - 1, 1.5, 0, Math.PI*2); c.fill();
        }
        c.globalAlpha = 1;

    } else if (bodyStyle === 'pickup') {
        // ── RAM PICKUP — big grille, open bed, chrome bumper ──
        // Open truck bed (rear half darker)
        c.fillStyle = 'rgba(0,0,0,.2)';
        c.fillRect(-cw/2, -ch/2 + 2, cw * 0.4, ch - 4);
        // Bed rails
        c.fillStyle = '#777';
        c.fillRect(-cw/2 + 2, -ch/2 - 1, cw * 0.35, 1.5);
        c.fillRect(-cw/2 + 2, ch/2 - 0.5, cw * 0.35, 1.5);
        // Big chrome grille — bold vertical bars
        c.fillStyle = '#ccc';
        c.fillRect(cw/2, -ch/2 + 1, 3, ch - 2);
        c.fillStyle = '#999';
        for (let i = 0; i < 4; i++) {
            var gy = -ch/2 + 3 + i * ((ch - 6) / 4);
            c.fillRect(cw/2, gy, 3, 1.5);
        }
        // Chrome front bumper
        c.fillStyle = '#bbb';
        c.fillRect(cw/2 + 2, -ch/2 + 2, 2, ch - 4);
        // Tow hitch on rear
        c.fillStyle = '#666';
        c.fillRect(-cw/2 - 4, -2, 5, 4);
        c.fillStyle = '#888';
        c.fillRect(-cw/2 - 3, -1, 3, 2);
        // Running boards
        c.fillStyle = '#555';
        c.fillRect(-cw/6, -ch/2 - 1, cw/3, 1.5);
        c.fillRect(-cw/6, ch/2 - 0.5, cw/3, 1.5);
        // Exhaust tip — single
        c.fillStyle = '#888';
        c.beginPath(); c.arc(-cw/2 - 2, ch/4, 2, 0, Math.PI*2); c.fill();
        c.fillStyle = '#555';
        c.beginPath(); c.arc(-cw/2 - 2, ch/4, 1.2, 0, Math.PI*2); c.fill();

    } else if (bodyStyle === 'roadster') {
        // ── BMW Z4 — long hood, short rear, aggressive stance ──
        // Cover default windshield
        c.fillStyle = col;
        c.fillRect(cw/2 - 15, -ch/2 + 4, 10, ch - 8);
        // Raked windshield — smaller and more angled
        c.fillStyle = 'rgba(100,180,255,.5)';
        c.beginPath();
        c.moveTo(cw/2 - 10, -ch/2 + 4);
        c.lineTo(cw/2 - 5, -ch/2 + 3);
        c.lineTo(cw/2 - 5, ch/2 - 3);
        c.lineTo(cw/2 - 10, ch/2 - 4);
        c.closePath(); c.fill();
        // Long hood line — center crease
        c.strokeStyle = 'rgba(255,255,255,.2)'; c.lineWidth = 0.8;
        c.beginPath(); c.moveTo(cw/2 - 5, 0); c.lineTo(4, 0); c.stroke();
        // Side intake vents
        c.fillStyle = 'rgba(0,0,0,.4)';
        c.beginPath();
        c.moveTo(4, -ch/2); c.lineTo(10, -ch/2); c.lineTo(6, -ch/2 + 3); c.lineTo(2, -ch/2 + 3);
        c.closePath(); c.fill();
        c.beginPath();
        c.moveTo(4, ch/2); c.lineTo(10, ch/2); c.lineTo(6, ch/2 - 3); c.lineTo(2, ch/2 - 3);
        c.closePath(); c.fill();
        // Dual kidney grille
        c.fillStyle = '#222';
        c.beginPath(); c.roundRect(cw/2 - 2, -ch/2 + 3, 3, (ch - 6) / 2 - 1, 1); c.fill();
        c.beginPath(); c.roundRect(cw/2 - 2, 1, 3, (ch - 6) / 2 - 1, 1); c.fill();
        c.fillStyle = '#555';
        c.fillRect(cw/2 - 1, -0.5, 2, 1);
        // Aggressive LED headlights
        c.fillStyle = '#fff';
        c.beginPath(); c.arc(cw/2, -ch/2 + 3, 2, 0, Math.PI*2); c.fill();
        c.beginPath(); c.arc(cw/2, ch/2 - 3, 2, 0, Math.PI*2); c.fill();
        // LED daytime running light accent
        c.strokeStyle = '#adf'; c.lineWidth = 0.7;
        c.beginPath(); c.arc(cw/2, -ch/2 + 3, 3, -0.8, 0.8); c.stroke();
        c.beginPath(); c.arc(cw/2, ch/2 - 3, 3, -0.8, 0.8); c.stroke();
        // Short rear deck with subtle spoiler lip
        c.fillStyle = 'rgba(0,0,0,.3)';
        c.fillRect(-cw/2 - 1, -ch/2 + 1, 3, ch - 2);
        // Dual exhaust
        c.fillStyle = '#888';
        c.beginPath(); c.arc(-cw/2, -ch/4, 2, 0, Math.PI*2); c.fill();
        c.beginPath(); c.arc(-cw/2, ch/4, 2, 0, Math.PI*2); c.fill();
        c.fillStyle = '#444';
        c.beginPath(); c.arc(-cw/2, -ch/4, 1.2, 0, Math.PI*2); c.fill();
        c.beginPath(); c.arc(-cw/2, ch/4, 1.2, 0, Math.PI*2); c.fill();

    } else if (bodyStyle === 'miata') {
        // ── MIATA — cute, small, pop-up headlights ──
        // Cover default headlights
        c.fillStyle = col;
        c.fillRect(cw/2 - 4, -ch/2 + 1, 5, 5);
        c.fillRect(cw/2 - 4, ch/2 - 6, 5, 5);
        // Pop-up headlights! (iconic)
        c.fillStyle = '#111';
        c.fillRect(cw/2 - 1, -ch/2 - 1, 3, 5);
        c.fillRect(cw/2 - 1, ch/2 - 4, 3, 5);
        c.fillStyle = '#ffa';
        c.beginPath(); c.arc(cw/2 + 0.5, -ch/2 + 0.5, 2.5, 0, Math.PI*2); c.fill();
        c.beginPath(); c.arc(cw/2 + 0.5, ch/2 - 0.5, 2.5, 0, Math.PI*2); c.fill();
        c.fillStyle = '#fff';
        c.beginPath(); c.arc(cw/2 + 1, -ch/2 + 0, 1, 0, Math.PI*2); c.fill();
        c.beginPath(); c.arc(cw/2 + 1, ch/2 + 0, 1, 0, Math.PI*2); c.fill();
        // Cover default windshield
        c.fillStyle = col;
        c.fillRect(cw/2 - 15, -ch/2 + 2, 10, ch - 4);
        // Small curved windshield
        c.fillStyle = 'rgba(120,200,255,.45)';
        c.beginPath(); c.arc(3, 0, 7, -1.2, 1.2); c.fill();
        // Soft-top (convertible) hint
        c.fillStyle = 'rgba(0,0,0,.15)';
        c.beginPath(); c.roundRect(-5, -ch/2 + 2, 10, ch - 4, 3); c.fill();
        // Cute smile grille
        c.strokeStyle = '#333'; c.lineWidth = 1;
        c.beginPath();
        c.moveTo(cw/2 - 1, -ch/4);
        c.quadraticCurveTo(cw/2 + 2, 0, cw/2 - 1, ch/4);
        c.stroke();
        // Small round tail lights
        c.fillStyle = '#f44';
        c.beginPath(); c.arc(-cw/2 + 1, -ch/2 + 4, 2, 0, Math.PI*2); c.fill();
        c.beginPath(); c.arc(-cw/2 + 1, ch/2 - 4, 2, 0, Math.PI*2); c.fill();
        // Exhaust
        c.fillStyle = '#888';
        c.beginPath(); c.arc(-cw/2 - 1, ch/3, 1.5, 0, Math.PI*2); c.fill();

    } else if (bodyStyle === 'monster') {
        // ── MONSTER TRUCK — huge wheels, lifted body ──
        // Draw big tires BEHIND body
        c.fillStyle = '#111';
        // Front wheels
        c.beginPath(); c.ellipse(cw/2 - 6, -ch/2, 6, 8, 0, 0, Math.PI*2); c.fill();
        c.beginPath(); c.ellipse(cw/2 - 6, ch/2, 6, 8, 0, 0, Math.PI*2); c.fill();
        // Rear wheels
        c.beginPath(); c.ellipse(-cw/2 + 6, -ch/2, 6, 8, 0, 0, Math.PI*2); c.fill();
        c.beginPath(); c.ellipse(-cw/2 + 6, ch/2, 6, 8, 0, 0, Math.PI*2); c.fill();
        // Tire tread pattern
        c.strokeStyle = '#333'; c.lineWidth = 1;
        for (let w = 0; w < 4; w++) {
            var wx = w < 2 ? cw/2 - 6 : -cw/2 + 6;
            var wy = (w % 2 === 0) ? -ch/2 : ch/2;
            for (let t = 0; t < 6; t++) {
                var ta = (t / 6) * Math.PI * 2;
                c.beginPath();
                c.moveTo(wx + Math.cos(ta) * 3, wy + Math.sin(ta) * 4);
                c.lineTo(wx + Math.cos(ta) * 5.5, wy + Math.sin(ta) * 7.5);
                c.stroke();
            }
        }
        // Wheel rims
        c.fillStyle = '#888';
        c.beginPath(); c.arc(cw/2 - 6, -ch/2, 2.5, 0, Math.PI*2); c.fill();
        c.beginPath(); c.arc(cw/2 - 6, ch/2, 2.5, 0, Math.PI*2); c.fill();
        c.beginPath(); c.arc(-cw/2 + 6, -ch/2, 2.5, 0, Math.PI*2); c.fill();
        c.beginPath(); c.arc(-cw/2 + 6, ch/2, 2.5, 0, Math.PI*2); c.fill();
        // Suspension springs visible
        c.strokeStyle = '#777'; c.lineWidth = 1.5;
        for (let side = -1; side <= 1; side += 2) {
            c.beginPath();
            c.moveTo(cw/4, side * (ch/2 - 4));
            c.lineTo(cw/2 - 8, side * ch/2);
            c.stroke();
            c.beginPath();
            c.moveTo(-cw/4, side * (ch/2 - 4));
            c.lineTo(-cw/2 + 8, side * ch/2);
            c.stroke();
        }
        // Body sits higher — redraw body panel over suspension
        c.fillStyle = col;
        c.beginPath(); c.roundRect(-cw/2 + 3, -ch/2 + 3, cw - 6, ch - 6, 3); c.fill();
        // Windshield
        c.fillStyle = 'rgba(100,180,255,.5)';
        c.fillRect(cw/2 - 14, -ch/2 + 6, 7, ch - 12);
        // Roll cage hint
        c.strokeStyle = 'rgba(150,150,150,.5)'; c.lineWidth = 1;
        c.beginPath(); c.roundRect(-cw/4, -ch/2 + 4, cw/2, ch - 8, 2); c.stroke();
        // Flame decal on hood
        c.fillStyle = 'rgba(255,100,0,.3)';
        c.beginPath();
        c.moveTo(cw/2 - 15, 0);
        c.bezierCurveTo(cw/2 - 8, -6, cw/2 - 4, -3, cw/2 - 2, -7);
        c.bezierCurveTo(cw/2 - 4, -1, cw/2 - 6, 2, cw/2 - 2, 7);
        c.bezierCurveTo(cw/2 - 4, 3, cw/2 - 8, 6, cw/2 - 15, 0);
        c.fill();
        // "MONSTER" roof lights
        c.fillStyle = '#ff4'; c.globalAlpha = 0.7;
        for (let i = 0; i < 5; i++) {
            c.beginPath(); c.arc(-6 + i * 3, -ch/2 + 4, 1.2, 0, Math.PI*2); c.fill();
        }
        c.globalAlpha = 1;

    } else if (bodyStyle === 'schoolbus') {
        // ── SCHOOL BUS — long, flat, iconic yellow ──
        // Window row — many small windows
        c.fillStyle = 'rgba(100,180,255,.45)';
        for (let i = 0; i < 7; i++) {
            var wx = -cw/2 + 10 + i * (cw - 20) / 7;
            c.fillRect(wx, -ch/2 + 2, 4, 3);
            c.fillRect(wx, ch/2 - 5, 4, 3);
        }
        // Window dividers (thin black lines)
        c.fillStyle = '#222';
        for (let i = 0; i <= 7; i++) {
            var wx = -cw/2 + 9 + i * (cw - 20) / 7;
            c.fillRect(wx, -ch/2 + 1.5, 1, 4);
            c.fillRect(wx, ch/2 - 5.5, 1, 4);
        }
        // Black bumpers
        c.fillStyle = '#222';
        c.fillRect(cw/2, -ch/2 + 1, 3, ch - 2);
        c.fillRect(-cw/2 - 2, -ch/2 + 1, 3, ch - 2);
        // STOP sign arm (folded, left side)
        c.fillStyle = '#d00';
        c.fillRect(cw/4, -ch/2 - 3, 8, 3);
        c.fillStyle = '#fff'; c.font = 'bold 2.5px Arial'; c.textAlign = 'center';
        c.fillText('STOP', cw/4 + 4, -ch/2 - 1);
        // Red flashing lights (top)
        c.fillStyle = '#f22';
        c.beginPath(); c.arc(cw/2 - 4, -ch/2 - 0.5, 2, 0, Math.PI*2); c.fill();
        c.beginPath(); c.arc(cw/2 - 4, ch/2 + 0.5, 2, 0, Math.PI*2); c.fill();
        // Amber side marker lights
        c.fillStyle = '#fa0'; c.globalAlpha = 0.8;
        c.fillRect(0, -ch/2 - 0.5, 3, 1.5);
        c.fillRect(0, ch/2 - 1, 3, 1.5);
        c.fillRect(-cw/4, -ch/2 - 0.5, 3, 1.5);
        c.fillRect(-cw/4, ch/2 - 1, 3, 1.5);
        c.globalAlpha = 1;
        // Rear emergency door outline
        c.strokeStyle = '#222'; c.lineWidth = 0.8;
        c.strokeRect(-cw/2 + 1, -ch/4, 5, ch/2);
        // Roof — flat black top section
        c.fillStyle = 'rgba(0,0,0,.1)';
        c.fillRect(-cw/3, -ch/2 + 4, cw * 0.6, ch - 8);
    }

    c.restore();
}


// ════════════════════════════════════════════════════════════════
//  INTERACTIVE DEMO
// ════════════════════════════════════════════════════════════════
const dCanvas = document.getElementById('demoCanvas');
const dc = dCanvas.getContext('2d');
const keys = {};
document.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
document.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

let demoCar = {
    x: 450, y: 200, angle: 0, vx: 0, vy: 0, speed: 0, nitro: false,
    typeIdx: 0
};

function demoLoop() {
    const ct = ALL_CARS[demoCar.typeIdx];
    const maxSpd = 3.5 * ct.maxSpeedMult;
    const acc = 0.08 * ct.accelMult;
    const turn = 0.045 * ct.turnMult;
    const friction = 0.985;
    const nitroMax = maxSpd * 1.6;

    // Input
    if (keys['w'] || keys['arrowup']) {
        demoCar.vx += Math.cos(demoCar.angle) * acc;
        demoCar.vy += Math.sin(demoCar.angle) * acc;
    }
    if (keys['s'] || keys['arrowdown']) {
        demoCar.vx -= Math.cos(demoCar.angle) * acc * 0.5;
        demoCar.vy -= Math.sin(demoCar.angle) * acc * 0.5;
    }
    var spd = Math.sqrt(demoCar.vx * demoCar.vx + demoCar.vy * demoCar.vy);
    if (spd > 0.3) {
        if (keys['a'] || keys['arrowleft']) demoCar.angle -= turn;
        if (keys['d'] || keys['arrowright']) demoCar.angle += turn;
    }
    demoCar.nitro = !!keys[' '];
    if (demoCar.nitro) {
        demoCar.vx += Math.cos(demoCar.angle) * acc * 0.5;
        demoCar.vy += Math.sin(demoCar.angle) * acc * 0.5;
    }

    // Physics
    demoCar.vx *= friction;
    demoCar.vy *= friction;
    spd = Math.sqrt(demoCar.vx * demoCar.vx + demoCar.vy * demoCar.vy);
    var limit = demoCar.nitro ? nitroMax : maxSpd;
    if (spd > limit) {
        demoCar.vx = demoCar.vx / spd * limit;
        demoCar.vy = demoCar.vy / spd * limit;
    }
    demoCar.x += demoCar.vx;
    demoCar.y += demoCar.vy;
    demoCar.speed = spd;

    // Wrap
    if (demoCar.x < -30) demoCar.x = dCanvas.width + 30;
    if (demoCar.x > dCanvas.width + 30) demoCar.x = -30;
    if (demoCar.y < -30) demoCar.y = dCanvas.height + 30;
    if (demoCar.y > dCanvas.height + 30) demoCar.y = -30;

    // Draw
    dc.fillStyle = '#2a2a40';
    dc.fillRect(0, 0, dCanvas.width, dCanvas.height);

    // Grid
    dc.strokeStyle = 'rgba(255,255,255,.05)';
    dc.lineWidth = 1;
    for (let x = 0; x < dCanvas.width; x += 40) { dc.beginPath(); dc.moveTo(x, 0); dc.lineTo(x, dCanvas.height); dc.stroke(); }
    for (let y = 0; y < dCanvas.height; y += 40) { dc.beginPath(); dc.moveTo(0, y); dc.lineTo(dCanvas.width, y); dc.stroke(); }

    // Draw all parked cars in a row for size comparison
    const parkY = 320;
    dc.fillStyle = 'rgba(255,255,255,.04)';
    dc.fillRect(0, parkY - 50, dCanvas.width, 100);
    dc.fillStyle = '#555'; dc.font = '11px Arial'; dc.textAlign = 'center';
    dc.fillText('Size comparison (all vehicles at 3x scale)', dCanvas.width / 2, parkY - 38);

    let parkX = 60;
    for (let i = 0; i < ALL_CARS.length; i++) {
        var pct = ALL_CARS[i];
        dc.save();
        dc.translate(parkX, parkY);
        drawCarBody(dc, pct.width, pct.height, pct.bodyStyle,
            i === demoCar.typeIdx ? '#ff6eb4' : '#667799', 3);
        dc.fillStyle = '#888'; dc.font = '9px Arial'; dc.textAlign = 'center';
        dc.fillText(pct.name, 0, 40);
        dc.restore();
        parkX += Math.max(pct.width * 3, 50) + 20;
    }

    // Draw player car
    dc.save();
    dc.translate(demoCar.x, demoCar.y);
    dc.rotate(demoCar.angle);
    drawCarBody(dc, ct.width, ct.height, ct.bodyStyle, '#ff6eb4', 3);
    dc.restore();

    // Nitro flame
    if (demoCar.nitro && spd > 0.5) {
        dc.save();
        dc.translate(demoCar.x, demoCar.y);
        dc.rotate(demoCar.angle);
        var flameLen = 15 + Math.random() * 10;
        dc.fillStyle = '#f80';
        dc.globalAlpha = 0.7;
        dc.beginPath();
        dc.moveTo(-ct.width/2 * 3, 0);
        dc.lineTo(-ct.width/2 * 3 - flameLen, -5 - Math.random() * 3);
        dc.lineTo(-ct.width/2 * 3 - flameLen * 0.7, 0);
        dc.lineTo(-ct.width/2 * 3 - flameLen, 5 + Math.random() * 3);
        dc.closePath(); dc.fill();
        dc.fillStyle = '#ff0';
        dc.globalAlpha = 0.5;
        dc.beginPath();
        dc.moveTo(-ct.width/2 * 3, 0);
        dc.lineTo(-ct.width/2 * 3 - flameLen * 0.5, -3);
        dc.lineTo(-ct.width/2 * 3 - flameLen * 0.3, 0);
        dc.lineTo(-ct.width/2 * 3 - flameLen * 0.5, 3);
        dc.closePath(); dc.fill();
        dc.globalAlpha = 1;
        dc.restore();
    }

    // Current car name
    dc.fillStyle = '#ffd700'; dc.font = 'bold 16px Arial'; dc.textAlign = 'left';
    dc.fillText(ct.name, 10, 24);
    dc.fillStyle = '#888'; dc.font = '12px Arial';
    dc.fillText(ct.description, 10, 42);

    requestAnimationFrame(demoLoop);
}
requestAnimationFrame(demoLoop);


// ════════════════════════════════════════════════════════════════
//  BUILD CARDS
// ════════════════════════════════════════════════════════════════
const TAG_CLASSES = {
    fast: 'tag-fast', heavy: 'tag-heavy', agile: 'tag-agile',
    armored: 'tag-armored', fragile: 'tag-fragile', huge: 'tag-huge',
    tiny: 'tag-tiny', grip: 'tag-grip'
};

function buildStatBar(label, value, max, color) {
    var pct = Math.min(value / max * 100, 100);
    return `<span class="stat-label">${label}</span>
        <span class="stat-bar"><span class="stat-fill" style="width:${pct}%;background:${color}"></span></span>
        <span class="stat-val">${value}</span>`;
}

function buildCard(car, idx) {
    var card = document.createElement('div');
    card.className = 'car-card' + (car.isNew ? ' new-car' : '');
    card.style.cursor = 'pointer';
    card.onclick = function() {
        demoCar.typeIdx = idx;
        document.getElementById('current-car').textContent = car.name;
    };

    // Preview canvas
    var cvs = document.createElement('canvas');
    cvs.width = 220; cvs.height = 100;
    var pc = cvs.getContext('2d');
    pc.save();
    pc.translate(110, 45);
    drawCarBody(pc, car.width, car.height, car.bodyStyle, '#ff6eb4', 3.5);
    pc.restore();

    // Tags
    var tagsHtml = (car.tags || []).map(t =>
        `<span class="tag ${TAG_CLASSES[t] || ''}">${t}</span>`
    ).join('');

    // Stats
    var statsHtml = '<div class="stats">' +
        buildStatBar('HP', car.hp, 260, '#4f4') +
        buildStatBar('SPD', Math.round(car.maxSpeedMult * 100), 140, '#4ff') +
        buildStatBar('ACC', Math.round(car.accelMult * 100), 130, '#ff4') +
        buildStatBar('TURN', Math.round(car.turnMult * 100), 140, '#fa4') +
        buildStatBar('MASS', Math.round(car.mass * 100), 260, '#f66') +
        buildStatBar('GRIP', Math.round((1 + car.gripBonus) * 100), 110, '#a6f') +
        buildStatBar('DMG', Math.round(car.collisionDmgMult * 100), 230, '#f4a') +
        '</div>';

    card.innerHTML = `
        <div class="car-preview"></div>
        <div class="car-name">${car.name}</div>
        <div class="car-desc">${car.description}</div>
        <div class="car-tags">${tagsHtml}</div>
        ${statsHtml}
    `;
    card.querySelector('.car-preview').appendChild(cvs);
    return card;
}

// Populate grids
var existingGrid = document.getElementById('existing-cars');
var newGrid = document.getElementById('new-cars');
ALL_CARS.forEach(function(car, i) {
    var card = buildCard(car, i);
    if (car.isNew) newGrid.appendChild(card);
    else existingGrid.appendChild(card);
});

// ════════════════════════════════════════════════════════════════
//  COMPARISON TABLE
// ════════════════════════════════════════════════════════════════
var compTable = document.getElementById('comp-table');
var thead = '<tr><th>Vehicle</th><th>Size</th><th>HP</th><th>Speed</th><th>Accel</th><th>Turn</th><th>Mass</th><th>Grip</th><th>Dmg</th></tr>';
var rows = ALL_CARS.map(function(car) {
    function bar(val, max, color) {
        var pct = Math.min(val / max * 100, 100);
        return `<span class="comp-bar" style="width:${pct}px;background:${color}"></span>${val}`;
    }
    var nameStyle = car.isNew ? ' style="color:#4f4"' : '';
    return `<tr>
        <td${nameStyle}><b>${car.name}</b></td>
        <td>${car.width}x${car.height}</td>
        <td>${bar(car.hp, 260, '#4f4')}</td>
        <td>${bar(Math.round(car.maxSpeedMult * 100), 140, '#4ff')}</td>
        <td>${bar(Math.round(car.accelMult * 100), 130, '#ff4')}</td>
        <td>${bar(Math.round(car.turnMult * 100), 140, '#fa4')}</td>
        <td>${bar(Math.round(car.mass * 100), 260, '#f66')}</td>
        <td>${bar(Math.round((1 + car.gripBonus) * 100), 110, '#a6f')}</td>
        <td>${bar(Math.round(car.collisionDmgMult * 100), 230, '#f4a')}</td>
    </tr>`;
}).join('');
compTable.innerHTML = thead + rows;
</script>
