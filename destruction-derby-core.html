<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Destruction Derby</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; }
#gameCanvas { display: block; }

/* ── Start / Game-Over Overlays ── */
.overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 200; color: #fff;
}
#start-screen { background: rgba(0,0,0,0.92); overflow-y: auto; }
#start-screen h1 {
    font-size: 56px; letter-spacing: 4px;
    background: linear-gradient(90deg, #ff6eb4, #6eb4ff);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 6px;
}
#start-screen h2 { font-size: 18px; color: #aaa; margin-bottom: 24px; font-weight: normal; }
.mode-selector { display: flex; gap: 20px; margin-bottom: 28px; }
.mode-btn {
    cursor: pointer; border: 3px solid #555; padding: 18px 38px;
    font-size: 20px; font-weight: bold; border-radius: 10px;
    background: rgba(255,255,255,.06); color: #aaa;
    letter-spacing: 2px; transition: transform .15s, border-color .15s, color .15s, background .15s;
}
.mode-btn:hover { transform: scale(1.04); border-color: #888; color: #ddd; }
.mode-btn.active-single { border-color: #ff6eb4; color: #ff6eb4; background: rgba(255,110,180,0.12); }
.mode-btn.active-multi { border-color: #6eb4ff; color: #6eb4ff; background: rgba(110,180,255,0.12); }
.player-cols { display: flex; gap: 60px; margin-bottom: 36px; text-align: center; }
.player-col { padding: 18px 28px; border-radius: 10px; }
.player-col.pink { background: rgba(255,110,180,0.15); border: 1px solid #ff6eb4; }
.player-col.blue { background: rgba(110,180,255,0.15); border: 1px solid #6eb4ff; }
.player-col .ptitle { font-size: 16px; font-weight: bold; margin-bottom: 10px; }
.player-col.pink .ptitle { color: #ff6eb4; }
.player-col.blue .ptitle { color: #6eb4ff; }
.player-col .pkey { font-size: 13px; color: #ccc; padding-top: 8px; }
.player-col .pkey table { margin: 0 auto; border-spacing: 4px 6px; }
.player-col .pkey td:first-child { text-align: right; color: #fff; font-weight: bold; padding-right: 10px; white-space: nowrap; }
.player-col .pkey td:last-child { text-align: left; }
.color-picker-row { margin: 12px 0 4px; }
.color-picker-row span { font-size: 12px; color: #aaa; margin-right: 8px; }
.color-swatches { display: flex; gap: 6px; justify-content: center; margin-top: 6px; flex-wrap: wrap; max-width: 280px; margin-left: auto; margin-right: auto; }
.color-swatch {
    width: 28px; height: 28px; border-radius: 50%; cursor: pointer;
    border: 3px solid transparent; transition: transform .12s, border-color .12s;
    pointer-events: all;
}
.color-swatch:hover { transform: scale(1.2); }
.color-swatch.selected { border-color: #fff; transform: scale(1.25); }
.start-btn {
    cursor: pointer; border: none; padding: 16px 56px;
    font-size: 24px; font-weight: bold; border-radius: 8px;
    background: linear-gradient(90deg, #ff6eb4, #6eb4ff);
    color: #fff; letter-spacing: 2px; transition: transform .15s;
}
.start-btn:hover { transform: scale(1.05); }
.sub-note { color: #666; font-size: 13px; margin-top: 20px; }
#game-over-screen { background: rgba(0,0,0,0.88); display: none; }
#game-over-screen h1 { font-size: 50px; margin-bottom: 12px; }
#game-over-stats { font-size: 17px; color: #ccc; line-height: 2; text-align: center; }
.restart-btn {
    cursor: pointer; border: none; padding: 14px 44px; margin-top: 24px;
    font-size: 20px; font-weight: bold; border-radius: 8px;
    background: linear-gradient(90deg, #ff6eb4, #6eb4ff);
    color: #fff; letter-spacing: 2px;
}
#pause-overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,.65); z-index: 140;
    display: none; flex-direction: column; align-items: center; justify-content: center;
    color: #fff;
}
#pause-overlay h1 { font-size: 52px; margin-bottom: 12px; letter-spacing: 4px; }
#pause-overlay .sub { color: #888; font-size: 16px; margin-bottom: 30px; }
#pause-overlay .resume-btn {
    pointer-events: all; cursor: pointer;
    background: linear-gradient(90deg, #ff6eb4, #6eb4ff);
    color: #fff; border: none; padding: 14px 44px;
    font-size: 20px; font-weight: bold; border-radius: 8px;
    letter-spacing: 2px;
}
#pause-overlay .menu-btn {
    pointer-events: all; cursor: pointer;
    background: #444; color: #ccc; border: none; padding: 12px 40px;
    font-size: 17px; font-weight: bold; border-radius: 8px;
    letter-spacing: 2px; margin-top: 14px;
}
#pause-overlay .menu-btn:hover { background: #555; color: #fff; }
.fullscreen-btn {
    pointer-events: all; cursor: pointer;
    background: rgba(255,255,255,.15); color: #aaa; border: 1px solid #555;
    padding: 8px 24px; font-size: 14px; font-weight: bold; border-radius: 6px;
    letter-spacing: 1px; margin-top: 14px; transition: background .15s;
}
.fullscreen-btn:hover { background: rgba(255,255,255,.25); color: #fff; }
#ingame-fullscreen-btn {
    position: absolute; top: 10px; left: 50%; transform: translateX(-50%); z-index: 150;
    pointer-events: all; cursor: pointer;
    background: rgba(0,0,0,.35); color: rgba(255,255,255,.5);
    border: 1px solid rgba(255,255,255,.2); border-radius: 4px;
    padding: 4px 8px; font-size: 16px; line-height: 1;
    transition: background .15s, color .15s;
}
#ingame-fullscreen-btn:hover { background: rgba(0,0,0,.6); color: rgba(255,255,255,.8); }
#setup-panel { display: none; }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>

<div id="pause-overlay">
    <h1>PAUSED</h1>
    <div class="sub">Press ESC or click to resume</div>
    <button class="resume-btn" onclick="togglePause()">RESUME</button>
    <button class="fullscreen-btn" onclick="toggleFullscreen()">FULLSCREEN</button>
    <button class="menu-btn" onclick="showStartScreen()">MENU</button>
</div>
<button id="ingame-fullscreen-btn" onclick="toggleFullscreen()" style="display:none;">&#x26F6;</button>

<!-- ── Start screen ── -->
<div id="start-screen" class="overlay">
    <h1>DESTRUCTION DERBY</h1>
    <h2>Choose Your Mode</h2>
    <div class="mode-selector">
        <button class="mode-btn active-single" id="btn-single" onclick="selectMode('single')">SINGLE PLAYER</button>
        <button class="mode-btn" id="btn-multi" onclick="selectMode('multi')">MULTIPLAYER</button>
    </div>
    <div id="setup-panel">
        <!-- Dynamically filled by selectMode() -->
    </div>
    <button class="start-btn" onclick="startGame()">START</button>
    <button class="fullscreen-btn" onclick="toggleFullscreen()" style="margin-top:12px;">FULLSCREEN</button>
    <div class="sub-note" id="sub-note-text">Auto-throttle is ON — just steer & smash! Destroy all 11 AI opponents to win.</div>
</div>

<!-- ── Game over screen ── -->
<div id="game-over-screen" class="overlay">
    <h1 id="go-title">GAME OVER</h1>
    <div id="game-over-stats"></div>
    <button class="restart-btn" onclick="showStartScreen()">PLAY AGAIN</button>
</div>

<script>
// ================================================================
//  CANVAS
// ================================================================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

// ================================================================
//  GAME MODE
// ================================================================
let gameMode = 'single'; // 'single' | 'multi'

// ================================================================
//  AUDIO — cute SFX via Web Audio API (no motor drone!)
// ================================================================
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;
function ensureAudio() { if (!audioCtx) audioCtx = new AudioCtx(); }

function playSfx(type) {
    ensureAudio();
    const ac = audioCtx;
    const now = ac.currentTime;
    const g = ac.createGain();
    g.connect(ac.destination);

    if (type === 'bump') {
        const o = ac.createOscillator();
        o.type = 'sine';
        o.frequency.setValueAtTime(280, now);
        o.frequency.exponentialRampToValueAtTime(80, now + 0.12);
        g.gain.setValueAtTime(0.35, now);
        g.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
        o.connect(g); o.start(now); o.stop(now + 0.16);
    }
    else if (type === 'hit') {
        const o = ac.createOscillator();
        o.type = 'square';
        o.frequency.setValueAtTime(400, now);
        o.frequency.exponentialRampToValueAtTime(60, now + 0.10);
        g.gain.setValueAtTime(0.25, now);
        g.gain.exponentialRampToValueAtTime(0.001, now + 0.13);
        o.connect(g); o.start(now); o.stop(now + 0.14);
        const buf = ac.createBuffer(1, ac.sampleRate * 0.07, ac.sampleRate);
        const d = buf.getChannelData(0);
        for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * 0.4;
        const n = ac.createBufferSource(); n.buffer = buf;
        const ng = ac.createGain(); ng.gain.setValueAtTime(0.22, now);
        ng.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
        n.connect(ng); ng.connect(ac.destination); n.start(now); n.stop(now + 0.09);
    }
    else if (type === 'explode') {
        const o = ac.createOscillator();
        o.type = 'sine';
        o.frequency.setValueAtTime(600, now);
        o.frequency.exponentialRampToValueAtTime(30, now + 0.35);
        g.gain.setValueAtTime(0.4, now);
        g.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
        o.connect(g); o.start(now); o.stop(now + 0.42);
        const buf = ac.createBuffer(1, ac.sampleRate * 0.25, ac.sampleRate);
        const d = buf.getChannelData(0);
        for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / d.length);
        const n = ac.createBufferSource(); n.buffer = buf;
        const ng = ac.createGain(); ng.gain.setValueAtTime(0.3, now);
        ng.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
        n.connect(ng); ng.connect(ac.destination); n.start(now); n.stop(now + 0.3);
    }
    else if (type === 'nitro') {
        const o = ac.createOscillator();
        o.type = 'sine';
        o.frequency.setValueAtTime(500, now);
        o.frequency.exponentialRampToValueAtTime(1200, now + 0.12);
        g.gain.setValueAtTime(0.12, now);
        g.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
        o.connect(g); o.start(now); o.stop(now + 0.16);
    }
    else if (type === 'drift') {
        const o = ac.createOscillator();
        o.type = 'sawtooth';
        o.frequency.setValueAtTime(900 + Math.random() * 300, now);
        o.frequency.exponentialRampToValueAtTime(300, now + 0.06);
        g.gain.setValueAtTime(0.06, now);
        g.gain.exponentialRampToValueAtTime(0.001, now + 0.07);
        o.connect(g); o.start(now); o.stop(now + 0.08);
    }
    else if (type === 'win') {
        const notes = [523, 659, 784, 1047];
        notes.forEach((f, i) => {
            const o = ac.createOscillator();
            o.type = 'sine';
            const gg = ac.createGain();
            o.frequency.value = f;
            gg.gain.setValueAtTime(0.25, now + i * 0.12);
            gg.gain.exponentialRampToValueAtTime(0.001, now + i * 0.12 + 0.25);
            o.connect(gg); gg.connect(ac.destination);
            o.start(now + i * 0.12); o.stop(now + i * 0.12 + 0.3);
        });
    }
    else if (type === 'lose') {
        const notes = [400, 350, 280, 200];
        notes.forEach((f, i) => {
            const o = ac.createOscillator();
            o.type = 'sine';
            const gg = ac.createGain();
            o.frequency.value = f;
            gg.gain.setValueAtTime(0.2, now + i * 0.18);
            gg.gain.exponentialRampToValueAtTime(0.001, now + i * 0.18 + 0.3);
            o.connect(gg); gg.connect(ac.destination);
            o.start(now + i * 0.18); o.stop(now + i * 0.18 + 0.35);
        });
    }
    else if (type === 'countdown') {
        const o = ac.createOscillator();
        o.type = 'sine';
        o.frequency.value = 660;
        g.gain.setValueAtTime(0.25, now);
        g.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
        o.connect(g); o.start(now); o.stop(now + 0.16);
    }
    else if (type === 'go') {
        const o = ac.createOscillator();
        o.type = 'sine';
        o.frequency.value = 990;
        g.gain.setValueAtTime(0.3, now);
        g.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
        o.connect(g); o.start(now); o.stop(now + 0.32);
    }
    else if (type === 'kill') {
        [660, 880].forEach((f, i) => {
            const o = ac.createOscillator();
            o.type = 'triangle';
            const gg = ac.createGain();
            o.frequency.value = f;
            gg.gain.setValueAtTime(0.22, now + i * 0.08);
            gg.gain.exponentialRampToValueAtTime(0.001, now + i * 0.08 + 0.18);
            o.connect(gg); gg.connect(ac.destination);
            o.start(now + i * 0.08); o.stop(now + i * 0.08 + 0.2);
        });
    }
}

// Throttle SFX so we don't spam
let lastSfx = {};
function playSfxThrottled(type, minGap) {
    const now = performance.now();
    if (lastSfx[type] && now - lastSfx[type] < minGap) return;
    lastSfx[type] = now;
    playSfx(type);
}

// ================================================================
//  CONFIG — Tweak these values to tune the feel!
//  Open the browser console and type: CONFIG
//  to inspect current values at runtime.
// ================================================================
const CONFIG = {
    // ── Acceleration ──
    autoAccel:      0.22,   // Forward push per frame (auto-throttle)
    brakeForce:     0.25,   // Braking deceleration per frame
    maxSpeed:       7.5,    // Normal top speed (px/frame)

    // ── Steering ──
    turnSpeed:      0.048,  // Normal steering rate (rad/frame)
    handbrakeTurn:  0.07,   // Handbrake steering rate

    // ── Surface Forward Friction ──
    // Per-frame velocity multiplier: lower = more drag = slower top speed
    // Range: 0.93 (very draggy) to 0.99 (almost frictionless)
    tarmacFriction: 0.978,  // Road — smooth, fast
    grassFriction:  0.965,  // Grass — noticeable drag
    dirtFriction:   0.955,  // Dirt — heavy drag

    // ── Lateral Grip (the big one for "ice" vs "grip") ──
    // Per-frame sideways velocity multiplier: lower = more grip
    // 0.70 = super grippy kart, 0.95 = ice skating
    tarmacGrip:     0.82,   // Tires grip well on road
    grassGrip:      0.88,   // Less grip on grass
    dirtGrip:       0.85,   // Moderate grip on dirt
    handbrakeGrip:  0.96,   // Very slidey during handbrake/drift

    // ── Nitro ──
    nitroAccel:     0.5,    // Nitro forward push
    nitroMaxSpeed:  12,     // Nitro speed cap
    nitroBurnFrames: 120,   // Duration of nitro burn (~2 sec at 60fps)
    nitroCooldown:  480,    // Cooldown after burn (~8 sec)
    nitroMax:       100,    // Nitro tank capacity

    // ── Collision ──
    collisionDmg:   0.9,    // Damage multiplier on impacts

    // ── Damage Penalties ──
    // Speed multiplier at various health levels (1.0 = full speed)
    dmgSpeedFull:   1.0,    // Above 60% health
    dmgSpeedMed:    0.82,   // 30-60% health — noticeably slower
    dmgSpeedLow:    0.55,   // Below 30% health — crawling
    dmgWobble:      0.04,   // Steering wobble intensity when badly damaged

    // ── Hazard Surfaces ──
    mudFriction:    0.935,  // Mud: very draggy
    mudGrip:        0.92,   // Mud: car slides around
    waterFriction:  0.92,   // Water: major slowdown
    waterGrip:      0.90,   // Water: slippery
    oilFriction:    0.985,  // Oil: almost no rolling drag (slidy)
    oilGrip:        0.97,   // Oil: nearly zero lateral grip — black ice

    // ── Bushes ──
    bushSlowdown:   0.92,   // Per-frame speed mult when in a bush

    // ── Bumps ──
    bumpBounce:     3.0,    // Upward kick strength from bumps
    bumpSpinChance: 0.3,    // Chance of brief spin on bump hit
};

// ── Fixed constants (not usually tweaked) ──
const ARENA_W = 3200;
const ARENA_H = 3200;
const CAR_W = 40;
const CAR_H = 22;

// ================================================================
//  SURFACE DETECTION & PHYSICS
// ================================================================
function getSurface(x, y) {
    // Check hazards first (they overlay base terrain)
    for (let p of oilSlicks) {
        let dx = x - p.x, dy = y - p.y;
        let cos = Math.cos(-p.angle), sin = Math.sin(-p.angle);
        let lx = dx*cos - dy*sin, ly = dx*sin + dy*cos;
        if ((lx*lx)/(p.rx*p.rx) + (ly*ly)/(p.ry*p.ry) < 1) return 'oil';
    }
    for (let p of waterPuddles) {
        if (Math.hypot(x - p.x, y - p.y) < p.r) return 'water';
    }
    for (let p of mudPatches) {
        if (Math.hypot(x - p.x, y - p.y) < p.r) return 'mud';
    }

    // Base terrain
    let cx = ARENA_W / 2, cy = ARENA_H / 2;
    let dx = x - cx, dy = y - cy;
    let dist = Math.hypot(dx, dy);

    if (dist < 520) return 'tarmac';

    if (dist < 1820) {
        let ang = Math.atan2(dy, dx);
        for (let i = 0; i < 4; i++) {
            let roadAng = (i / 4) * Math.PI * 2 + Math.PI / 4;
            let perpDist = Math.abs(Math.sin(ang - roadAng)) * dist;
            let alongDist = Math.cos(ang - roadAng) * dist;
            if (alongDist > 0 && perpDist < 52) return 'tarmac';
        }
    }

    for (let p of dirtPatches) {
        if (Math.hypot(x - p.x, y - p.y) < p.r) return 'dirt';
    }

    return 'grass';
}

function getDamageMultiplier(car) {
    let hp = car.health / car.maxHealth;
    if (hp > 0.6) return CONFIG.dmgSpeedFull;
    if (hp > 0.3) {
        // Smooth lerp between full and med
        let t = (hp - 0.3) / 0.3;
        return CONFIG.dmgSpeedMed + t * (CONFIG.dmgSpeedFull - CONFIG.dmgSpeedMed);
    }
    // Smooth lerp between low and med
    let t = hp / 0.3;
    return CONFIG.dmgSpeedLow + t * (CONFIG.dmgSpeedMed - CONFIG.dmgSpeedLow);
}

function applyFriction(car, isHandbrake) {
    let surface = getSurface(car.x, car.y);

    // Decompose velocity into forward and lateral components
    let fx = Math.cos(car.angle), fy = Math.sin(car.angle);
    let forwardSpd = car.vx * fx + car.vy * fy;
    let lateralSpd = car.vx * (-fy) + car.vy * fx;

    // Forward friction (rolling resistance)
    let fwd, lat;
    switch (surface) {
        case 'tarmac': fwd = CONFIG.tarmacFriction; lat = CONFIG.tarmacGrip; break;
        case 'dirt':   fwd = CONFIG.dirtFriction;   lat = CONFIG.dirtGrip;   break;
        case 'mud':    fwd = CONFIG.mudFriction;     lat = CONFIG.mudGrip;    break;
        case 'water':  fwd = CONFIG.waterFriction;   lat = CONFIG.waterGrip;  break;
        case 'oil':    fwd = CONFIG.oilFriction;     lat = CONFIG.oilGrip;    break;
        default:       fwd = CONFIG.grassFriction;   lat = CONFIG.grassGrip;  break;
    }

    // Handbrake overrides lateral grip
    if (isHandbrake) lat = CONFIG.handbrakeGrip;

    forwardSpd *= fwd;
    lateralSpd *= lat;

    // Reconstruct velocity from components
    car.vx = fx * forwardSpd + (-fy) * lateralSpd;
    car.vy = fy * forwardSpd + fx * lateralSpd;

    return surface;
}

// ================================================================
//  GAME STATE
// ================================================================
let gameState = 'menu'; // menu | countdown | playing | paused | gameover
let countdownVal = 3;
let countdownTimer = 0;
let gameTime = 0;
let cars = [];
let particles = [];
let skidMarks = [];
let debris = [];
let keys = {};
let powerUps = [];
let powerUpSpawnTimer = 0;
let obstacles = [];
let grassPatches = [];
let dirtPatches = [];
let mudPatches = [];
let waterPuddles = [];
let oilSlicks = [];
let bushes = [];
let bumps = [];
let floatingTexts = [];
let score = 0;

let P1_COLOR = '#ff6eb4';
let P2_COLOR = '#6eb4ff';

const PLAYER_COLOR_OPTIONS = [
    '#ff6eb4', '#ff3388', '#ff4466', '#e03030', '#ff6030',
    '#ff9030', '#ffcc00', '#88dd22', '#30c030', '#20ccaa',
    '#30c0c0', '#6eb4ff', '#3060e0', '#6060ff', '#a060ff',
    '#c040c0', '#e0e0e0', '#ffaacc', '#aaffdd', '#ffe066'
];

// ================================================================
//  MODE SELECTOR & START SCREEN
// ================================================================
function selectMode(mode) {
    gameMode = mode;
    let btnSingle = document.getElementById('btn-single');
    let btnMulti = document.getElementById('btn-multi');
    let panel = document.getElementById('setup-panel');
    let subNote = document.getElementById('sub-note-text');

    btnSingle.className = 'mode-btn' + (mode === 'single' ? ' active-single' : '');
    btnMulti.className = 'mode-btn' + (mode === 'multi' ? ' active-multi' : '');

    if (mode === 'single') {
        panel.innerHTML = `
            <div class="player-cols">
                <div class="player-col pink" id="p1-col">
                    <div class="ptitle" id="p1-title">Your Car</div>
                    <div class="color-picker-row">
                        <span>Pick your color:</span>
                        <div class="color-swatches" id="p1-swatches"></div>
                    </div>
                    <div class="pkey">
                        <table>
                            <tr><td>A / &#8592;</td><td>Steer Left</td></tr>
                            <tr><td>D / &#8594;</td><td>Steer Right</td></tr>
                            <tr><td>S / &#8595;</td><td>Brake</td></tr>
                            <tr><td>W / &#8593;</td><td>Nitro</td></tr>
                            <tr><td>Space</td><td>Handbrake</td></tr>
                            <tr><td>R</td><td>Reset Position</td></tr>
                        </table>
                    </div>
                </div>
            </div>`;
        subNote.textContent = 'Auto-throttle is ON \u2014 just steer & smash! Destroy all 11 AI opponents to win.';
    } else {
        panel.innerHTML = `
            <div class="player-cols">
                <div class="player-col pink" id="p1-col">
                    <div class="ptitle" id="p1-title">Player 1 \u2014 Left</div>
                    <div class="color-picker-row">
                        <span>Pick your color:</span>
                        <div class="color-swatches" id="p1-swatches"></div>
                    </div>
                    <div class="pkey">

// Build color swatches on start screen
function buildSwatches() {

    if (!p1Container) return;
    p1Container.innerHTML = '';
    PLAYER_COLOR_OPTIONS.forEach(c => {
        const s1 = document.createElement('div');

            p1Container.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));

    if (gameMode === 'multi') {

        p2Container.innerHTML = '';
        PLAYER_COLOR_OPTIONS.forEach(c => {
            const s2 = document.createElement('div');
            s2.className = 'color-swatch' + (c === P2_COLOR ? ' selected' : '');

// ================================================================
//  TERRAIN
// ================================================================
function isOnTarmac(x, y) {
    let cx = ARENA_W/2, cy = ARENA_H/2;
    let dx = x - cx, dy = y - cy, dist = Math.hypot(dx, dy);
    if (dist < 540) return true;
    if (dist < 1840) {
        let ang = Math.atan2(dy, dx);
        for (let i = 0; i < 4; i++) {
            let roadAng = (i/4)*Math.PI*2 + Math.PI/4;
            if (Math.cos(ang - roadAng)*dist > 0 && Math.abs(Math.sin(ang - roadAng))*dist < 70) return true;
        }
    }
    return false;
}

function generateTerrain() {
    grassPatches = [];
    dirtPatches = [];
    mudPatches = [];
    waterPuddles = [];
    oilSlicks = [];
    bushes = [];
    bumps = [];

    for (let i = 0; i < 250; i++) {
        grassPatches.push({
            x: Math.random() * ARENA_W, y: Math.random() * ARENA_H,
            r: 15 + Math.random() * 45, shade: Math.random() * 0.15
        });
    }
    for (let i = 0; i < 90; i++) {
        dirtPatches.push({
            x: Math.random() * ARENA_W, y: Math.random() * ARENA_H,
            r: 10 + Math.random() * 30, shade: Math.random() * 0.1
        });
    }

    // Mud patches — placed on grass/dirt areas
    for (let i = 0; i < 12; i++) {
        let mx = 200 + Math.random() * (ARENA_W - 400);
        let my = 200 + Math.random() * (ARENA_H - 400);
        if (isOnTarmac(mx, my)) continue;
        mudPatches.push({ x: mx, y: my, r: 30 + Math.random() * 50 });
    }

    // Water puddles — scattered, some on roads too
    for (let i = 0; i < 8; i++) {
        let wx = 200 + Math.random() * (ARENA_W - 400);
        let wy = 200 + Math.random() * (ARENA_H - 400);
        waterPuddles.push({
            x: wx, y: wy,
            r: 25 + Math.random() * 40,
            phase: Math.random() * Math.PI * 2  // for ripple animation
        });
    }

    // Oil slicks — on or near roads
    for (let i = 0; i < 6; i++) {
        let ox = 300 + Math.random() * (ARENA_W - 600);
        let oy = 300 + Math.random() * (ARENA_H - 600);
        let ang = Math.random() * Math.PI * 2;
        oilSlicks.push({
            x: ox, y: oy,
            rx: 20 + Math.random() * 30,
            ry: 12 + Math.random() * 18,
            angle: ang
        });
    }

    // Bushes — on grass areas only
    for (let i = 0; i < 18; i++) {
        let bx = 150 + Math.random() * (ARENA_W - 300);
        let by = 150 + Math.random() * (ARENA_H - 300);
        if (isOnTarmac(bx, by)) continue;
        if (Math.hypot(bx - ARENA_W/2, by - ARENA_H/2) < 400) continue;
        bushes.push({
            x: bx, y: by,
            r: 18 + Math.random() * 22,
            leaves: Array.from({length: 5 + (Math.random()*5|0)}, () => ({
                dx: (Math.random()-.5) * 30,
                dy: (Math.random()-.5) * 30,
                r: 6 + Math.random() * 10,
                shade: Math.random() * 0.3
            }))
        });
    }

    // Bumps / speed bumps — on roads
    for (let i = 0; i < 10; i++) {
        let bx = 300 + Math.random() * (ARENA_W - 600);
        let by = 300 + Math.random() * (ARENA_H - 600);
        if (!isOnTarmac(bx, by)) { i--; continue; }
        if (Math.hypot(bx - ARENA_W/2, by - ARENA_H/2) < 200) continue;
        bumps.push({
            x: bx, y: by,
            r: 12 + Math.random() * 10,
            angle: Math.random() * Math.PI
        });
    }

    obstacles = [];
}

function createCar(x, y, angle, color, name, playerIdx) {
    return {
        x, y, angle, vx: 0, vy: 0, speed: 0,
        color, name, playerIdx, // 0=p1, 1=p2 (multi only), -1=AI
        health: 100, maxHealth: 100, alive: true,
        nitro: CONFIG.nitroMax, handbrake: false, drifting: false,
        nitroCooldown: 0, nitroActive: false, nitroBurnTimer: 0,
        width: CAR_W, height: CAR_H,
        kills: 0, hits: 0, damageDealt: 0,
        aiTarget: null, aiState: 'roam', aiTimer: 0, aiSteerDir: 0,
        damageCooldown: 0, lastHitBy: null, spinTimer: 0, invincible: 0,
        nitroSfxCooldown: 0, driftSfxCooldown: 0,
        turnTimer: 0, prevAngle: angle,
        respawnTimer: 0, deaths: 0,
        activePowerUp: null, powerUpTimer: 0
    };
}

function spawnCars() {
    cars = [];
    CAR_COLORS[0] = P1_COLOR;
    CAR_COLORS[1] = P2_COLOR;

    if (gameMode === 'single') {
        // Single player: 1 player + 11 AI
        cars.push(createCar(ARENA_W/2, ARENA_H/2, -Math.PI/2, P1_COLOR, 'PLAYER', 0));
        let numAI = 11;
        for (let i = 0; i < numAI; i++) {
            const ang = (i / numAI) * Math.PI * 2;
            const dist = 500 + Math.random() * 600;
            cars.push(createCar(
                ARENA_W/2 + Math.cos(ang) * dist,
                ARENA_H/2 + Math.sin(ang) * dist,
                ang + Math.PI,
                CAR_COLORS[i + 2], CAR_NAMES[i + 2], -1
            ));
        }
    } else {
        // Multiplayer: 2 players + 10 AI
        cars.push(createCar(ARENA_W/2 - 120, ARENA_H/2, -Math.PI/2, P1_COLOR, CAR_NAMES[0], 0));
        cars.push(createCar(ARENA_W/2 + 120, ARENA_H/2, -Math.PI/2, P2_COLOR, CAR_NAMES[1], 1));
        let numAI = 10;
        for (let i = 0; i < numAI; i++) {
            const ang = (i / numAI) * Math.PI * 2;
            const dist = 600 + Math.random() * 500;
            cars.push(createCar(
                ARENA_W/2 + Math.cos(ang) * dist,
                ARENA_H/2 + Math.sin(ang) * dist,
                ang + Math.PI,
                CAR_COLORS[i + 2], CAR_NAMES[i + 2], -1
            ));
        }
    }
}
