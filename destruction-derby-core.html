// ================================================================
//  UPDATE — PLAYER (auto-throttle)
// ================================================================
function updatePlayer(car) {
    if (!car.alive) return;

    let left, right, brake, nitroKey, handbrakeKey;

    if (gameMode === 'single' && car.playerIdx === 0) {
        // Single player: BOTH WASD and Arrows work
        // Reset position with R key
        if (keys['KeyR']) {
            car.vx = 0; car.vy = 0; car.speed = 0;
            car.spinTimer = 0;
            keys['KeyR'] = false;
        }
        left  = keys['KeyA'] || keys['ArrowLeft'];
        right = keys['KeyD'] || keys['ArrowRight'];
        brake = keys['KeyS'] || keys['ArrowDown'];
        nitroKey = keys['KeyW'] || keys['ArrowUp'];
        handbrakeKey = keys['Space'];
    } else if (car.playerIdx === 0) {
        // Multiplayer P1: WASD
        left  = keys['KeyA'];
        right = keys['KeyD'];
        brake = keys['KeyS'];
        nitroKey = keys['KeyW'];
        handbrakeKey = keys['KeyQ'];
    } else {
        // Multiplayer P2: Arrows
        left  = keys['ArrowLeft'];
        right = keys['ArrowRight'];
        brake = keys['ArrowDown'];
        nitroKey = keys['ArrowUp'];
        handbrakeKey = keys['KeyM'];
    }

    car.handbrake = handbrakeKey;
    let spd = Math.hypot(car.vx, car.vy);
    let turnRate = car.handbrake ? CONFIG.handbrakeTurn : CONFIG.turnSpeed;
    if (spd < 1) turnRate *= spd;

    let isTurning = left || right;
    if (left)  car.angle -= turnRate;
    if (right) car.angle += turnRate;

    // Track how long the player has been turning
    let angleDelta = car.angle - car.prevAngle;
    while (angleDelta > Math.PI) angleDelta -= Math.PI * 2;
    while (angleDelta < -Math.PI) angleDelta += Math.PI * 2;
    if (isTurning && Math.abs(angleDelta) > 0.01) {
        car.turnTimer++;
    } else {
        car.turnTimer = Math.max(0, car.turnTimer - 2);
    }
    car.prevAngle = car.angle;

    // Nitro activation: cooldown-based system
    if (nitroKey && car.nitro >= CONFIG.nitroMax && car.nitroCooldown <= 0 && !car.nitroActive) {
        car.nitroActive = true;
        car.nitroBurnTimer = CONFIG.nitroBurnFrames;
    }

    // Nitro burn timer
    if (car.nitroActive) {
        car.nitroBurnTimer--;
        if (car.nitroBurnTimer <= 0) {
            car.nitroActive = false;
            car.nitroCooldown = CONFIG.nitroCooldown;
            car.nitro = 0;
        }
    }

    // Cooldown tick
    if (car.nitroCooldown > 0) {
        car.nitroCooldown--;
        if (car.nitroCooldown <= 0) {
            car.nitro = CONFIG.nitroMax; // fully recharged
        }
    }

    let useNitro = car.nitroActive;
    let speedMult = car.activePowerUp === 'speed' ? 1.35 : 1;
    let dmgMult = getDamageMultiplier(car);
    let accel = (useNitro ? CONFIG.nitroAccel : CONFIG.autoAccel) * speedMult * dmgMult;
    let maxSpd = (useNitro ? CONFIG.nitroMaxSpeed : CONFIG.maxSpeed) * speedMult * dmgMult;

    // Wobble steering when badly damaged
    let hp = car.health / car.maxHealth;
    if (hp < 0.4) {
        let wobbleIntensity = CONFIG.dmgWobble * (1 - hp / 0.4);
        car.angle += Math.sin(performance.now() * 0.008 + car.x) * wobbleIntensity
                   + Math.sin(performance.now() * 0.013) * wobbleIntensity * 0.5;
    }

    // Auto-throttle (always on unless braking hard and nearly stopped)
    if (!brake || spd > 1) {
        car.vx += Math.cos(car.angle) * accel;
        car.vy += Math.sin(car.angle) * accel;
    }
    if (brake) {
        car.vx -= Math.cos(car.angle) * CONFIG.brakeForce;
        car.vy -= Math.sin(car.angle) * CONFIG.brakeForce;
    }

    // Nitro effects — particles & sound
    if (useNitro) {
        if (car.nitroSfxCooldown <= 0) {
            playSfxThrottled('nitro', 300);
            car.nitroSfxCooldown = 18;
        }
        let nCount = Math.random() < 0.5 ? 1 : 2;
        for (let i = 0; i < nCount; i++) {
            particles.push(mkParticle(
                car.x - Math.cos(car.angle) * 22,
                car.y - Math.sin(car.angle) * 22,
                -Math.cos(car.angle)*2 + (Math.random()-.5)*1,
                -Math.sin(car.angle)*2 + (Math.random()-.5)*1,
                ['#ff4400','#ff8800','#ffcc00'][Math.random()*3|0],
                4 + Math.random()*5, 0.06
            ));
        }
    }
    if (car.nitroSfxCooldown > 0) car.nitroSfxCooldown--;

    // Surface-aware friction with lateral grip
    applyFriction(car, car.handbrake);

    spd = Math.hypot(car.vx, car.vy);
    if (spd > maxSpd) { car.vx = car.vx/spd*maxSpd; car.vy = car.vy/spd*maxSpd; }

    // Drift FX — handbrake
    if (car.handbrake && spd > 3) {
        car.drifting = true;
        addSkid(car);
        particles.push(mkParticle(
            car.x - Math.cos(car.angle)*18, car.y - Math.sin(car.angle)*18,
            (Math.random()-.5)*1.5, (Math.random()-.5)*1.5, '#999', 8+Math.random()*6, 0.03
        ));
        if (car.driftSfxCooldown <= 0) {
            playSfxThrottled('drift', 120);
            car.driftSfxCooldown = 8;
        }
    }
    // Sharp-turn skid marks (after turning for > 8 frames at speed)
    else if (car.turnTimer > 8 && spd > 2.5) {
        car.drifting = true;
        addSkid(car);
        if (car.turnTimer % 3 === 0) {
            particles.push(mkParticle(
                car.x - Math.cos(car.angle)*16, car.y - Math.sin(car.angle)*16,
                (Math.random()-.5)*0.8, (Math.random()-.5)*0.8, '#aaa', 5+Math.random()*4, 0.04
            ));
        }
        if (car.driftSfxCooldown <= 0) {
            playSfxThrottled('drift', 200);
            car.driftSfxCooldown = 12;
        }
    } else {
        car.drifting = false;
    }
    if (car.driftSfxCooldown > 0) car.driftSfxCooldown--;

    car.speed = spd;
}

// ================================================================
//  UPDATE — AI
// ================================================================
function updateAI(car, dt) {
    if (!car.alive) return;
    car.aiTimer -= dt;
    let spd = Math.hypot(car.vx, car.vy);

    if (car.aiTimer <= 0) {
        car.aiTimer = 1 + Math.random() * 2;
        car.aiState = car.health < 25 ? 'flee' : (Math.random() < 0.7 ? 'chase' : 'roam');
        if (car.aiState === 'chase') {
            let best = null, bestD = Infinity;
            for (let o of cars) {
                if (o === car || !o.alive) continue;
                let d = Math.hypot(o.x - car.x, o.y - car.y);
                if (o.playerIdx >= 0) d *= 0.55; // prefer humans
                if (d < bestD) { bestD = d; best = o; }
            }
            car.aiTarget = best;
        }
    }

    let targetAng = car.angle;
    let targetDist = Infinity;
    if (car.aiState === 'chase' && car.aiTarget?.alive) {
        targetAng = Math.atan2(car.aiTarget.y - car.y, car.aiTarget.x - car.x);
        targetDist = Math.hypot(car.aiTarget.x - car.x, car.aiTarget.y - car.y);
    } else if (car.aiState === 'flee') {
        let best = null, bestD = Infinity;
        for (let o of cars) { if (o===car||!o.alive) continue; let d=Math.hypot(o.x-car.x,o.y-car.y); if(d<bestD){bestD=d;best=o;}}
        if (best) targetAng = Math.atan2(car.y - best.y, car.x - best.x);
    } else {
        if (Math.random() < 0.02) car.aiSteerDir = (Math.random()-.5)*0.06;
        targetAng = car.angle + car.aiSteerDir;
    }

    // Wall / obstacle avoid
    const wm = 160;
    let nearWall = false;
    if (car.x < wm) { targetAng = 0; if (car.x < 120) nearWall = true; }
    if (car.x > ARENA_W - wm) { targetAng = Math.PI; if (car.x > ARENA_W - 120) nearWall = true; }
    if (car.y < wm) { targetAng = Math.PI/2; if (car.y < 120) nearWall = true; }
    if (car.y > ARENA_H - wm) { targetAng = -Math.PI/2; if (car.y > ARENA_H - 120) nearWall = true; }
    let nearObs = false;
    for (let obs of obstacles) {
        let obsDist = Math.hypot(obs.x-car.x, obs.y-car.y);
        if (obsDist < obs.r + 80) targetAng = Math.atan2(car.y-obs.y, car.x-obs.x);
        if (obsDist < obs.r + 50) nearObs = true;
    }

    let diff = targetAng - car.angle;
    while (diff > Math.PI) diff -= Math.PI*2;
    while (diff < -Math.PI) diff += Math.PI*2;
    if (diff > 0.05) car.angle += CONFIG.turnSpeed*0.8;
    else if (diff < -0.05) car.angle -= CONFIG.turnSpeed*0.8;

    // Track AI turning for skid marks
    let aiAngleDelta = car.angle - car.prevAngle;
    while (aiAngleDelta > Math.PI) aiAngleDelta -= Math.PI*2;
    while (aiAngleDelta < -Math.PI) aiAngleDelta += Math.PI*2;
    if (Math.abs(aiAngleDelta) > 0.01) car.turnTimer++;
    else car.turnTimer = Math.max(0, car.turnTimer - 2);
    car.prevAngle = car.angle;

    // --- AI Nitro usage (cooldown-based) ---
    if (car.aiState === 'chase' && car.aiTarget?.alive && targetDist < 400
        && car.nitro >= CONFIG.nitroMax && car.nitroCooldown <= 0 && !car.nitroActive) {
        car.nitroActive = true;
        car.nitroBurnTimer = CONFIG.nitroBurnFrames;
    }

    // AI nitro burn timer
    if (car.nitroActive) {
        car.nitroBurnTimer--;
        if (car.nitroBurnTimer <= 0) {
            car.nitroActive = false;
            car.nitroCooldown = CONFIG.nitroCooldown;
            car.nitro = 0;
        }
    }

    // AI cooldown tick
    if (car.nitroCooldown > 0) {
        car.nitroCooldown--;
        if (car.nitroCooldown <= 0) {
            car.nitro = CONFIG.nitroMax;
        }
    }

    let aiUseNitro = car.nitroActive;

    // --- AI Power-up speed boost + damage penalty ---
    let speedMult = car.activePowerUp === 'speed' ? 1.35 : 1;
    let dmgMult = getDamageMultiplier(car);

    let accel = (aiUseNitro ? CONFIG.nitroAccel : CONFIG.autoAccel * 0.82) * speedMult * dmgMult;
    let cap = (aiUseNitro ? CONFIG.nitroMaxSpeed : CONFIG.maxSpeed * 0.82) * speedMult * dmgMult;

    // Wobble steering when badly damaged
    let hp = car.health / car.maxHealth;
    if (hp < 0.4) {
        let wobbleIntensity = CONFIG.dmgWobble * (1 - hp / 0.4);
        car.angle += Math.sin(performance.now() * 0.008 + car.x) * wobbleIntensity
                   + Math.sin(performance.now() * 0.013) * wobbleIntensity * 0.5;
    }

    // Auto accel
    car.vx += Math.cos(car.angle) * accel;
    car.vy += Math.sin(car.angle) * accel;

    // --- AI Braking ---
    if (nearWall && spd > 2) {
        car.vx *= 0.88;
        car.vy *= 0.88;
    }
    if (nearObs && spd > 2) {
        car.vx *= 0.92;
        car.vy *= 0.92;
    }
    if (car.aiState === 'chase' && car.aiTarget?.alive && spd > 2) {
        let dirToTargetX = car.aiTarget.x - car.x;
        let dirToTargetY = car.aiTarget.y - car.y;
        let dotProduct = car.vx * dirToTargetX + car.vy * dirToTargetY;
        if (dotProduct < 0) {
            car.vx *= 0.95;
            car.vy *= 0.95;
        }
    }

    // --- AI Nitro effects ---
    if (aiUseNitro) {
        if (car.nitroSfxCooldown <= 0) {
            playSfxThrottled('nitro', 300);
            car.nitroSfxCooldown = 18;
        }
        let nCount = Math.random() < 0.5 ? 1 : 2;
        for (let i = 0; i < nCount; i++) {
            particles.push(mkParticle(
                car.x - Math.cos(car.angle) * 22,
                car.y - Math.sin(car.angle) * 22,
                -Math.cos(car.angle)*2 + (Math.random()-.5)*1,
                -Math.sin(car.angle)*2 + (Math.random()-.5)*1,
                ['#ff4400','#ff8800','#ffcc00'][Math.random()*3|0],
                4 + Math.random()*5, 0.06
            ));
        }
    }
    if (car.nitroSfxCooldown > 0) car.nitroSfxCooldown--;

    // Surface-aware friction with lateral grip
    applyFriction(car, false);
    spd = Math.hypot(car.vx, car.vy);
    if (spd > cap) { car.vx = car.vx/spd*cap; car.vy = car.vy/spd*cap; }
    car.speed = spd;

    // AI sharp-turn skid marks
    if (car.turnTimer > 8 && spd > 2.5) {
        addSkid(car);
        if (car.turnTimer % 4 === 0) {
            particles.push(mkParticle(
                car.x - Math.cos(car.angle)*16, car.y - Math.sin(car.angle)*16,
                (Math.random()-.5)*0.6, (Math.random()-.5)*0.6, '#aaa', 4+Math.random()*3, 0.04
            ));
        }
    } else if (Math.abs(diff) > 0.8 && spd > 3) {
        addSkid(car);
    }
}

// ================================================================
//  MOVEMENT & COLLISIONS
// ================================================================
function moveCar(car) {
    if (!car.alive) return;
    if (car.spinTimer > 0) { car.spinTimer--; car.angle += 0.15; }
    car.x += car.vx; car.y += car.vy;

    // Surface particles — kick up grass/dirt when driving off-road
    let spd = Math.hypot(car.vx, car.vy);
    if (spd > 2) {
        let surface = getSurface(car.x, car.y);
        if (surface === 'grass' && Math.random() < 0.3) {
            particles.push(mkParticle(
                car.x - Math.cos(car.angle)*16 + (Math.random()-.5)*12,
                car.y - Math.sin(car.angle)*16 + (Math.random()-.5)*12,
                (Math.random()-.5)*1.5, -Math.random()*1,
                ['#5a8a2a','#4a7a22','#6a9a3a'][Math.random()*3|0],
                2+Math.random()*3, 0.04
            ));
        } else if (surface === 'dirt' && Math.random() < 0.35) {
            particles.push(mkParticle(
                car.x - Math.cos(car.angle)*16 + (Math.random()-.5)*12,
                car.y - Math.sin(car.angle)*16 + (Math.random()-.5)*12,
                (Math.random()-.5)*1.5, -Math.random()*1,
                ['#8a7a55','#7a6a45','#9a8a65'][Math.random()*3|0],
                2+Math.random()*3, 0.04
            ));
        } else if (surface === 'mud' && Math.random() < 0.5) {
            particles.push(mkParticle(
                car.x + (Math.random()-.5)*16, car.y + (Math.random()-.5)*16,
                (Math.random()-.5)*2.5, -Math.random()*2,
                ['#3d2b1a','#4a3520','#55402a','#2a1a0a'][Math.random()*4|0],
                3+Math.random()*4, 0.03
            ));
        }
    }

    const m = 60;
    if (car.x < m) { car.x = m; car.vx *= -0.5; }
    if (car.x > ARENA_W-m) { car.x = ARENA_W-m; car.vx *= -0.5; }
    if (car.y < m) { car.y = m; car.vy *= -0.5; }
    if (car.y > ARENA_H-m) { car.y = ARENA_H-m; car.vy *= -0.5; }

    for (let obs of obstacles) {
        let dx = car.x - obs.x, dy = car.y - obs.y;
        let dist = Math.hypot(dx, dy), minD = obs.r + 20;
        if (dist < minD && dist > 0) {
            let nx = dx/dist, ny = dy/dist;
            car.x = obs.x + nx*minD; car.y = obs.y + ny*minD;
            let dot = car.vx*nx + car.vy*ny;
            car.vx -= 1.5*dot*nx; car.vy -= 1.5*dot*ny;
            car.vx *= 0.6; car.vy *= 0.6;
            if (Math.abs(dot) > 2) {
                car.health -= Math.abs(dot)*2;
                spawnSparks(car.x - nx*20, car.y - ny*20, 5);
                playSfxThrottled('bump', 80);
            }
        }
    }
    if (car.damageCooldown > 0) car.damageCooldown--;
    if (car.invincible > 0) car.invincible--;

    // --- Hazard interactions ---
    let carSpd = Math.hypot(car.vx, car.vy);

    // Bushes — slow down + leaf particles
    for (let b of bushes) {
        if (Math.hypot(car.x - b.x, car.y - b.y) < b.r + 15) {
            car.vx *= CONFIG.bushSlowdown;
            car.vy *= CONFIG.bushSlowdown;
            if (carSpd > 1.5 && Math.random() < 0.6) {
                particles.push(mkParticle(
                    car.x + (Math.random()-.5)*20, car.y + (Math.random()-.5)*20,
                    (Math.random()-.5)*3 + car.vx*0.3, (Math.random()-.5)*3 + car.vy*0.3,
                    ['#3a7a1a','#4a9a2a','#2a6a10','#5aaa3a'][Math.random()*4|0],
                    3+Math.random()*5, 0.03
                ));
            }
        }
    }

    // Bumps — bounce + possible spin
    for (let b of bumps) {
        let bd = Math.hypot(car.x - b.x, car.y - b.y);
        if (bd < b.r + 12 && carSpd > 2) {
            if (!car._lastBump || car._lastBump !== b) {
                car._lastBump = b;
                // Kick the car sideways/upward
                let kickAngle = Math.atan2(car.vy, car.vx) + (Math.random()-.5)*0.8;
                car.vx += Math.cos(kickAngle) * CONFIG.bumpBounce * 0.5;
                car.vy += Math.sin(kickAngle) * CONFIG.bumpBounce * 0.5;
                if (Math.random() < CONFIG.bumpSpinChance) car.spinTimer = 8;
                playSfxThrottled('bump', 150);
            }
        } else if (car._lastBump === b) {
            car._lastBump = null;
        }
    }

    // Water splashes
    for (let w of waterPuddles) {
        if (Math.hypot(car.x - w.x, car.y - w.y) < w.r && carSpd > 2 && Math.random() < 0.4) {
            particles.push(mkParticle(
                car.x + (Math.random()-.5)*16, car.y + (Math.random()-.5)*16,
                (Math.random()-.5)*2, -Math.random()*2.5,
                ['#6ac8ff','#88ddff','#aaeeff','#fff'][Math.random()*4|0],
                2+Math.random()*4, 0.04
            ));
        }
    }
}

function checkCollisions() {
    for (let i = 0; i < cars.length; i++) {
        for (let j = i+1; j < cars.length; j++) {
            let a = cars[i], b = cars[j];
            if (!a.alive || !b.alive) continue;
            let dx = b.x-a.x, dy = b.y-a.y, dist = Math.hypot(dx,dy);
            if (dist < 35 && dist > 0) {
                let nx = dx/dist, ny = dy/dist, overlap = 35-dist;
                a.x -= nx*overlap*.5; a.y -= ny*overlap*.5;
                b.x += nx*overlap*.5; b.y += ny*overlap*.5;
                let rvx = a.vx-b.vx, rvy = a.vy-b.vy;
                let impact = Math.abs(rvx*nx + rvy*ny);
                let dot = rvx*nx + rvy*ny;
                a.vx -= dot*nx*.5; a.vy -= dot*ny*.5;
                b.vx += dot*nx*.5; b.vy += dot*ny*.5;

                if (impact > 1.5) {
                    let dmg = impact * CONFIG.collisionDmg * (2+Math.random());
                    let aS = Math.hypot(a.vx,a.vy), bS = Math.hypot(b.vx,b.vy);
                    let dB = dmg*(aS/(aS+bS+.1)) * (a.activePowerUp === 'damage' ? 2 : 1);
                    let dA = dmg*(bS/(aS+bS+.1)) * (b.activePowerUp === 'damage' ? 2 : 1);

                    if (a.damageCooldown<=0 && a.invincible<=0) {
                        let finalDA = a.activePowerUp === 'shield' ? dA * 0.3 : dA;
                        a.health -= finalDA; a.lastHitBy = b; a.damageCooldown = 10;
                    }
                    if (b.damageCooldown<=0 && b.invincible<=0) {
                        let finalDB = b.activePowerUp === 'shield' ? dB * 0.3 : dB;
                        b.health -= finalDB; b.lastHitBy = a; b.damageCooldown = 10;
                    }

                    // Track hits & damage for human players
                    if (a.playerIdx >= 0) { a.hits++; a.damageDealt += dB; }
                    if (b.playerIdx >= 0) { b.hits++; b.damageDealt += dA; }

                    if (impact > 5) { if (dA > dB) a.spinTimer = 15; else b.spinTimer = 15; }

                    let cx = (a.x+b.x)/2, cy = (a.y+b.y)/2;
                    spawnSparks(cx, cy, impact*2|0);
                    spawnSmoke(cx, cy, impact|0);

                    if (impact > 4) playSfxThrottled('hit', 60);
                    else playSfxThrottled('bump', 60);

                    if (impact > 4) {
                        for (let k = 0; k < 3; k++) {
                            debris.push({
                                x: cx, y: cy,
                                vx: (Math.random()-.5)*5, vy: (Math.random()-.5)*5,
                                angle: Math.random()*Math.PI*2, spin: (Math.random()-.5)*.2,
                                size: 3+Math.random()*5,
                                color: Math.random()<.5 ? a.color : b.color,
                                life: 60+Math.random()*60
                            });
                        }
                    }

                    floatingTexts.push({
                        x: cx, y: cy - 20, text: `-${Math.round(dmg)}`,
                        color: '#ff4', alpha: 1, vy: -0.8, life: 80
                    });

                    // Occasional swear bubble on the car that got hit harder
                    if (impact > 3 && Math.random() < 0.3) {
                        let victim = dA > dB ? a : b;
                        let swears = ['#@$%!', 'HEY!!', 'OUCH!', '%@#$!', 'ARGH!', 'RUDE!', 'WTF!', '$#@%!', 'OW!!', 'NOOO!'];
                        floatingTexts.push({
                            x: victim.x, y: victim.y - 40,
                            text: swears[Math.random() * swears.length | 0],
                            color: '#fff', alpha: 1, vy: -0.4, life: 100,
                            bubble: true, bubbleColor: victim.color
                        });
                    }
                }
                checkDeath(a);
                checkDeath(b);
            }
        }
    }
}

function respawnCar(car) {
    let bestX, bestY, bestDist = 0;
    for (let attempt = 0; attempt < 20; attempt++) {
        let rx = 200 + Math.random() * (ARENA_W - 400);
        let ry = 200 + Math.random() * (ARENA_H - 400);
        let minDist = Infinity;
        for (let c of cars) {
            if (!c.alive || c === car) continue;
            let d = Math.hypot(c.x - rx, c.y - ry);
            if (d < minDist) minDist = d;
        }
        for (let o of obstacles) {
            let d = Math.hypot(o.x - rx, o.y - ry) - o.r;
            if (d < minDist) minDist = d;
        }
        if (minDist > bestDist) { bestDist = minDist; bestX = rx; bestY = ry; }
    }
    car.x = bestX; car.y = bestY;
    car.vx = 0; car.vy = 0; car.speed = 0;
    car.angle = Math.random() * Math.PI * 2;
    car.prevAngle = car.angle;
    car.health = car.maxHealth;
    car.alive = true;
    car.spinTimer = 0;
    car.turnTimer = 0;
    car.invincible = 120;
    car.nitro = CONFIG.nitroMax;
    car.nitroCooldown = 0;
    car.nitroActive = false;
    car.nitroBurnTimer = 0;
    car.lastHitBy = null;
    for (let i = 0; i < 15; i++) {
        let a = (i / 15) * Math.PI * 2;
        particles.push(mkParticle(
            car.x + Math.cos(a) * 30, car.y + Math.sin(a) * 30,
            Math.cos(a) * 2, Math.sin(a) * 2,
            car.color, 5 + Math.random() * 4, 0.04
        ));
    }
}

function checkDeath(car) {
    if (car.health <= 0 && car.alive) {
        car.alive = false; car.health = 0;
        spawnExplosion(car.x, car.y, car.color);
        playSfx('explode');

        if (car.lastHitBy) {
            car.lastHitBy.kills++;
            if (gameMode === 'single' && car.lastHitBy.playerIdx === 0) {
                // Single player: award score for kills
                score += 500;
                playSfx('kill');
                floatingTexts.push({
                    x: car.x, y: car.y - 30,
                    text: `+500 DESTROYED ${car.name}!`,
                    color: car.lastHitBy.color, alpha: 1, vy: -0.5, life: 120
                });
            } else if (gameMode === 'multi' && car.lastHitBy.playerIdx >= 0) {
                // Multiplayer: kill notification
                playSfx('kill');
                floatingTexts.push({
                    x: car.x, y: car.y - 30,
                    text: `\u{1F4A5} ${car.lastHitBy.name} destroyed ${car.name}!`,
                    color: car.lastHitBy.color, alpha: 1, vy: -0.5, life: 120
                });
            }
        }

        // Killer celebration bubble (any car that gets a kill)
        if (car.lastHitBy && car.lastHitBy.alive && Math.random() < 0.5) {
            let killer = car.lastHitBy;
            let cheers = ['WOOHOO!', 'YEAH!!', 'GET REKT!', 'BOOM!', 'HAHA!', 'EZ!', 'LATER!', 'BYE BYE!', 'CRUSHED!', 'OWNED!', 'TOO EASY!', 'YESSS!'];
            floatingTexts.push({
                x: killer.x, y: killer.y - 42,
                text: cheers[Math.random() * cheers.length | 0],
                color: '#fff', alpha: 1, vy: -0.35, life: 110,
                bubble: true, bubbleColor: killer.color
            });
        }

        // Players auto-respawn after 5 seconds
        if (car.playerIdx >= 0) {
            car.deaths = (car.deaths || 0) + 1;
            car.respawnTimer = 300; // 5 seconds at 60fps
        }

        // Game ends when all AI are destroyed
        let aiAlive = cars.filter(c => c.playerIdx === -1 && c.alive).length;
        if (aiAlive === 0) {
            setTimeout(() => endGame(), 1000);
        }
    }
}

// ================================================================
//  POWER-UPS
// ================================================================
const POWERUP_TYPES = [
    { type: 'health',  icon: '+',  color: '#44ff44', glow: '#22aa22', label: 'REPAIR',       duration: 0   },
    { type: 'shield',  icon: 'O',  color: '#44ffff', glow: '#2288aa', label: 'SHIELD',       duration: 480 },
    { type: 'damage',  icon: '!',  color: '#ff4444', glow: '#aa2222', label: 'DOUBLE DMG',   duration: 420 },
    { type: 'speed',   icon: '>',  color: '#ffff44', glow: '#aaaa22', label: 'SPEED BOOST',  duration: 360 },
    { type: 'nitro',   icon: 'N',  color: '#ff8800', glow: '#aa5500', label: 'FULL NITRO',   duration: 0   },
    { type: 'magnet',  icon: 'M',  color: '#ff66ff', glow: '#aa44aa', label: 'MAGNET',       duration: 420 },
];

function spawnPowerUp() {
    let px, py, valid;
    for (let attempt = 0; attempt < 30; attempt++) {
        px = 150 + Math.random() * (ARENA_W - 300);
        py = 150 + Math.random() * (ARENA_H - 300);
        valid = true;
        for (let o of obstacles) { if (Math.hypot(o.x-px, o.y-py) < o.r + 40) { valid = false; break; } }
        if (valid) for (let p of powerUps) { if (Math.hypot(p.x-px, p.y-py) < 80) { valid = false; break; } }
        if (valid) break;
    }
    if (!valid) return;
    let def = POWERUP_TYPES[Math.random() * POWERUP_TYPES.length | 0];
    powerUps.push({
        x: px, y: py, ...def,
        bobPhase: Math.random() * Math.PI * 2,
        life: 900
    });
}

function updatePowerUps() {
    powerUpSpawnTimer--;
    if (powerUpSpawnTimer <= 0 && powerUps.length < 5) {
        spawnPowerUp();
        powerUpSpawnTimer = 240 + Math.random() * 120;
    }

    for (let i = powerUps.length - 1; i >= 0; i--) {
        powerUps[i].life--;
        powerUps[i].bobPhase += 0.06;
        if (powerUps[i].life <= 0) powerUps.splice(i, 1);
    }

    for (let i = powerUps.length - 1; i >= 0; i--) {
        let pu = powerUps[i];
        for (let car of cars) {
            if (!car.alive) continue;
            if (Math.hypot(car.x - pu.x, car.y - pu.y) < 30) {
                applyPowerUp(car, pu);
                powerUps.splice(i, 1);
                break;
            }
        }
    }

    for (let car of cars) {
        if (car.powerUpTimer > 0) {
            car.powerUpTimer--;
            if (car.powerUpTimer <= 0) car.activePowerUp = null;
        }
        if (car.activePowerUp === 'magnet' && car.alive) {
            for (let pu of powerUps) {
                let dx = car.x - pu.x, dy = car.y - pu.y;
                let dist = Math.hypot(dx, dy);
                if (dist < 250 && dist > 5) {
                    pu.x += (dx / dist) * 3;
                    pu.y += (dy / dist) * 3;
                }
            }
        }
    }
}

function applyPowerUp(car, pu) {
    playSfxThrottled('nitro', 50);

    floatingTexts.push({
        x: car.x, y: car.y - 35,
        text: pu.label, color: pu.color,
        alpha: 1, vy: -1, life: 50
    });

    for (let i = 0; i < 10; i++) {
        let a = (i/10) * Math.PI * 2;
        particles.push(mkParticle(
            pu.x + Math.cos(a)*15, pu.y + Math.sin(a)*15,
            Math.cos(a)*2.5, Math.sin(a)*2.5,
            pu.color, 4 + Math.random()*3, 0.05
        ));
    }

    if (pu.type === 'health') {
        car.health = Math.min(car.maxHealth, car.health + 40);
    } else if (pu.type === 'nitro') {
        car.nitro = CONFIG.nitroMax;
        car.nitroCooldown = 0;
        car.nitroActive = false;
        car.nitroBurnTimer = 0;
    } else {
        car.activePowerUp = pu.type;
        car.powerUpTimer = pu.duration;
    }
}

function drawPowerUps() {
    for (let pu of powerUps) {
        let bob = Math.sin(pu.bobPhase) * 4;
        let py = pu.y + bob;
        let flashAlpha = pu.life < 120 ? (Math.sin(pu.life * 0.3) * 0.3 + 0.5) : 0.8;

        ctx.globalAlpha = flashAlpha * 0.3;
        ctx.fillStyle = pu.glow;
        ctx.beginPath(); ctx.arc(pu.x, py, 22, 0, Math.PI*2); ctx.fill();

        ctx.globalAlpha = flashAlpha;
        ctx.fillStyle = '#111';
        ctx.beginPath(); ctx.arc(pu.x, py, 14, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = pu.color; ctx.lineWidth = 2.5;
        ctx.beginPath(); ctx.arc(pu.x, py, 14, 0, Math.PI*2); ctx.stroke();

        ctx.fillStyle = pu.color;
        ctx.font = 'bold 14px Arial'; ctx.textAlign = 'center';
        ctx.fillText(pu.icon, pu.x, py + 5);

        ctx.globalAlpha = 1;
    }
}

// ================================================================
//  END GAME
// ================================================================
function endGame() {
    gameState = 'gameover';
    const title = document.getElementById('go-title');

    if (gameMode === 'single') {
        let p = cars[0];
        let playerWon = p.alive || cars.filter(c => c.playerIdx === -1 && c.alive).length === 0;
        if (playerWon) { playSfx('win'); title.textContent = 'YOU WIN!'; title.style.color = '#4f4'; }
        else { playSfx('lose'); title.textContent = 'GAME OVER'; title.style.color = '#f44'; }

        let mins = Math.floor(gameTime/60);
        let secs = Math.floor(gameTime%60);
        document.getElementById('game-over-stats').innerHTML = `
            <div style="color:${P1_COLOR}">
                <b>Final Score: ${score}</b><br><br>
                Kills: ${p.kills}<br>
                Deaths: ${p.deaths}<br>
                Hits: ${p.hits}<br>
                Damage Dealt: ${Math.round(p.damageDealt)}<br>
                Time Survived: ${mins}:${secs.toString().padStart(2,'0')}
            </div>
        `;
    } else {
        let p1 = cars[0], p2 = cars[1];
        let winner;
        if (p1.kills > p2.kills) winner = 'P1';
        else if (p2.kills > p1.kills) winner = 'P2';
        else if (p1.deaths < p2.deaths) winner = 'P1';
        else if (p2.deaths < p1.deaths) winner = 'P2';
        else if (p1.damageDealt > p2.damageDealt) winner = 'P1';
        else if (p2.damageDealt > p1.damageDealt) winner = 'P2';
        else winner = 'TIE';

        if (winner !== 'TIE') playSfx('win'); else playSfx('lose');

        if (winner === 'TIE') { title.textContent = "IT'S A TIE!"; title.style.color = '#aaa'; }
        else if (winner === 'P1') { title.textContent = `${p1.name} WINS!`; title.style.color = P1_COLOR; }
        else { title.textContent = `${p2.name} WINS!`; title.style.color = P2_COLOR; }

        let mins = Math.floor(gameTime/60);
        let secs = Math.floor(gameTime%60);
        document.getElementById('game-over-stats').innerHTML = `
            <div style="display:flex;gap:60px;justify-content:center">
                <div style="color:${P1_COLOR}">
                    <b>${p1.name}</b><br>
                    Kills: ${p1.kills}<br>
                    Deaths: ${p1.deaths}<br>
                    Hits: ${p1.hits}<br>
                    Damage: ${Math.round(p1.damageDealt)}
                </div>
                <div style="color:${P2_COLOR}">
                    <b>${p2.name}</b><br>
                    Kills: ${p2.kills}<br>
                    Deaths: ${p2.deaths}<br>
                    Hits: ${p2.hits}<br>
                    Damage: ${Math.round(p2.damageDealt)}
                </div>
            </div>
            <br>Time: ${mins}:${secs.toString().padStart(2,'0')}
        `;
    }
    document.getElementById('game-over-screen').style.display = 'flex';
}

// ================================================================
//  PARTICLES / FX
// ================================================================
function mkParticle(x,y,vx,vy,color,size,decay) {
    return {x,y,vx,vy,color,size,alpha:1,decay:decay||0.02};
}
function addSkid(car) {
    let speed = Math.hypot(car.vx, car.vy);
    let w = car.drifting ? 3.5 : 2;
    let intensity = Math.min(1, speed / 6);
    let lx = car.x - Math.cos(car.angle + 0.45) * 14;
    let ly = car.y - Math.sin(car.angle + 0.45) * 14;
    let rx = car.x - Math.cos(car.angle - 0.45) * 14;
    let ry = car.y - Math.sin(car.angle - 0.45) * 14;
    let bx = Math.cos(car.angle) * 4;
    let by = Math.sin(car.angle) * 4;
    skidMarks.push(
        { x1: lx, y1: ly, x2: lx - bx, y2: ly - by, w: w, alpha: 0.5 * intensity, life: 1800, maxLife: 1800 },
        { x1: rx, y1: ry, x2: rx - bx, y2: ry - by, w: w, alpha: 0.5 * intensity, life: 1800, maxLife: 1800 }
    );
}
function spawnSparks(x,y,n) {
    for (let i=0;i<n;i++) particles.push(mkParticle(x,y,(Math.random()-.5)*8,(Math.random()-.5)*8,['#ff0','#fa0','#fff','#ff4'][Math.random()*4|0],2+Math.random()*3,.05));
}
function spawnSmoke(x,y,n) {
    for (let i=0;i<n;i++) particles.push(mkParticle(x+(Math.random()-.5)*10,y+(Math.random()-.5)*10,(Math.random()-.5),(Math.random()-.5),'#666',8+Math.random()*12,.015));
}
function spawnExplosion(x,y,color) {
    for (let i=0;i<40;i++){let a=Math.random()*Math.PI*2,s=2+Math.random()*6;particles.push(mkParticle(x,y,Math.cos(a)*s,Math.sin(a)*s,['#f00','#f80','#ff0','#fff'][Math.random()*4|0],5+Math.random()*10,.02));}
    for (let i=0;i<20;i++){let a=Math.random()*Math.PI*2,s=1+Math.random()*3;particles.push(mkParticle(x,y,Math.cos(a)*s,Math.sin(a)*s,'#333',12+Math.random()*15,.01));}
    for (let i=0;i<12;i++) debris.push({x,y,vx:(Math.random()-.5)*8,vy:(Math.random()-.5)*8,angle:Math.random()*Math.PI*2,spin:(Math.random()-.5)*.3,size:4+Math.random()*8,color:Math.random()<.5?color:'#444',life:80+Math.random()*80});
}
function updateFX() {
    for (let i=particles.length-1;i>=0;i--){let p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vx*=.96;p.vy*=.96;p.alpha-=p.decay;p.size*=.99;if(p.alpha<=0)particles.splice(i,1);}
    for (let i = skidMarks.length - 1; i >= 0; i--) {
        let s = skidMarks[i];
        s.life--;
        if (s.life < s.maxLife * 0.3) {
            s.alpha *= 0.995;
        }
        if (s.life <= 0 || s.alpha < 0.01) skidMarks.splice(i, 1);
    }
    if (skidMarks.length > 5000) skidMarks.splice(0, 1000);
    for (let i=debris.length-1;i>=0;i--){let d=debris[i];d.x+=d.vx;d.y+=d.vy;d.vx*=.97;d.vy*=.97;d.angle+=d.spin;d.life--;if(d.life<=0)debris.splice(i,1);}
    for (let i=floatingTexts.length-1;i>=0;i--){let f=floatingTexts[i];f.y+=f.vy;f.life--;f.alpha=Math.min(1,f.life/25);if(f.life<=0)floatingTexts.splice(i,1);}
}

// ================================================================
//  DRAWING
// ================================================================
function drawTerrain() {
    ctx.fillStyle='#4a6e2a';
    ctx.fillRect(0,0,ARENA_W,ARENA_H);
    for (let p of grassPatches){ctx.fillStyle=`rgba(60,100,30,${.05+p.shade})`;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();}
    for (let p of dirtPatches){ctx.fillStyle=`rgba(120,100,60,${.3+p.shade})`;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();}

    // Mud patches
    for (let p of mudPatches) {
        // Dark wet mud base
        ctx.fillStyle='#3d2b1a';
        ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
        // Wet sheen highlight
        ctx.fillStyle='rgba(80,55,30,0.6)';
        ctx.beginPath();ctx.arc(p.x-p.r*0.15,p.y-p.r*0.15,p.r*0.7,0,Math.PI*2);ctx.fill();
        // Edge blend
        ctx.strokeStyle='rgba(61,43,26,0.4)';ctx.lineWidth=6;
        ctx.beginPath();ctx.arc(p.x,p.y,p.r+2,0,Math.PI*2);ctx.stroke();
    }

    // Tarmac roads
    ctx.fillStyle='#3a3a3a';
    ctx.beginPath();ctx.arc(ARENA_W/2,ARENA_H/2,520,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,.12)';ctx.lineWidth=2;ctx.setLineDash([20,30]);
    ctx.beginPath();ctx.arc(ARENA_W/2,ARENA_H/2,320,0,Math.PI*2);ctx.stroke();
    ctx.beginPath();ctx.arc(ARENA_W/2,ARENA_H/2,160,0,Math.PI*2);ctx.stroke();
    ctx.setLineDash([]);

    ctx.fillStyle='#3a3a3a';
    for (let i=0;i<4;i++){
        let a=(i/4)*Math.PI*2+Math.PI/4;
        ctx.save();ctx.translate(ARENA_W/2,ARENA_H/2);ctx.rotate(a);
        ctx.fillRect(0,-52,1300,104);
        ctx.strokeStyle='rgba(255,255,255,.18)';ctx.lineWidth=2;ctx.setLineDash([15,25]);
        ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(1300,0);ctx.stroke();
        ctx.setLineDash([]);
        ctx.strokeStyle='rgba(255,255,255,.25)';ctx.lineWidth=3;ctx.setLineDash([40,20]);
        ctx.beginPath();ctx.moveTo(520,-50);ctx.lineTo(1300,-50);ctx.stroke();
        ctx.beginPath();ctx.moveTo(520,50);ctx.lineTo(1300,50);ctx.stroke();
        ctx.setLineDash([]);
        ctx.restore();
    }

    // Water puddles
    let t = performance.now() * 0.001;
    for (let w of waterPuddles) {
        // Dark shadow under water
        ctx.fillStyle='rgba(20,50,80,0.5)';
        ctx.beginPath();ctx.arc(w.x,w.y,w.r+3,0,Math.PI*2);ctx.fill();
        // Water base
        ctx.fillStyle='rgba(40,120,200,0.55)';
        ctx.beginPath();ctx.arc(w.x,w.y,w.r,0,Math.PI*2);ctx.fill();
        // Animated ripples
        ctx.strokeStyle='rgba(140,200,255,0.3)';ctx.lineWidth=1;
        let r1 = w.r * 0.4 + Math.sin(t*2 + w.phase)*w.r*0.15;
        let r2 = w.r * 0.7 + Math.sin(t*1.5 + w.phase+1)*w.r*0.1;
        ctx.beginPath();ctx.arc(w.x,w.y,r1,0,Math.PI*2);ctx.stroke();
        ctx.beginPath();ctx.arc(w.x,w.y,r2,0,Math.PI*2);ctx.stroke();
        // Specular highlight
        ctx.fillStyle='rgba(200,240,255,0.2)';
        ctx.beginPath();ctx.arc(w.x-w.r*0.2,w.y-w.r*0.25,w.r*0.3,0,Math.PI*2);ctx.fill();
    }

    // Oil slicks
    for (let o of oilSlicks) {
        ctx.save();
        ctx.translate(o.x, o.y);
        ctx.rotate(o.angle);
        // Rainbow-ish sheen
        let oilGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, o.rx);
        oilGrad.addColorStop(0, 'rgba(30,30,30,0.7)');
        oilGrad.addColorStop(0.4, 'rgba(80,40,120,0.5)');
        oilGrad.addColorStop(0.7, 'rgba(40,80,60,0.4)');
        oilGrad.addColorStop(1, 'rgba(20,20,20,0.2)');
        ctx.fillStyle = oilGrad;
        ctx.beginPath();
        ctx.ellipse(0, 0, o.rx, o.ry, 0, 0, Math.PI*2);
        ctx.fill();
        // Shiny highlight
        ctx.fillStyle='rgba(255,255,255,0.08)';
        ctx.beginPath();
        ctx.ellipse(-o.rx*0.2, -o.ry*0.2, o.rx*0.4, o.ry*0.3, 0, 0, Math.PI*2);
        ctx.fill();
        ctx.restore();
    }

    // Bumps / speed bumps
    for (let b of bumps) {
        ctx.save();
        ctx.translate(b.x, b.y);
        ctx.rotate(b.angle);
        // Yellow/black striped bump
        ctx.fillStyle='rgba(200,180,50,0.7)';
        ctx.fillRect(-b.r, -5, b.r*2, 10);
        for (let s = -b.r; s < b.r; s += 8) {
            ctx.fillStyle = (((s/8|0)%2===0)?'rgba(40,40,40,0.5)':'rgba(220,200,50,0.6)');
            ctx.fillRect(s, -5, 4, 10);
        }
        ctx.strokeStyle='rgba(0,0,0,0.3)';ctx.lineWidth=1;
        ctx.strokeRect(-b.r, -5, b.r*2, 10);
        ctx.restore();
    }
}

// Draw bushes (after obstacles, before cars — they're passable)
function drawBushes() {
    for (let b of bushes) {
        // Shadow
        ctx.fillStyle='rgba(0,0,0,0.15)';
        ctx.beginPath();ctx.arc(b.x+3,b.y+3,b.r,0,Math.PI*2);ctx.fill();
        // Leaf clusters
        for (let l of b.leaves) {
            let shade = 0.6 + l.shade;
            ctx.fillStyle=`rgba(${40*shade|0},${100*shade|0},${25*shade|0},0.85)`;
            ctx.beginPath();
            ctx.arc(b.x + l.dx, b.y + l.dy, l.r, 0, Math.PI*2);
            ctx.fill();
        }
        // Highlight on top
        ctx.fillStyle='rgba(80,160,40,0.4)';
        ctx.beginPath();ctx.arc(b.x-b.r*0.15,b.y-b.r*0.2,b.r*0.5,0,Math.PI*2);ctx.fill();
    }
}
function drawWalls() {
    ctx.fillStyle='#222';
    const sp=60;
    for (let x=30;x<ARENA_W;x+=sp){drawTire(x,30);drawTire(x,ARENA_H-30);}
    for (let y=30;y<ARENA_H;y+=sp){drawTire(30,y);drawTire(ARENA_W-30,y);}
}
function drawTire(x,y) {
    ctx.fillStyle='#222';ctx.beginPath();ctx.arc(x,y,18,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#444';ctx.lineWidth=1.5;ctx.stroke();
}
function drawObstacles() {
    for (let o of obstacles){
        ctx.fillStyle='rgba(0,0,0,.25)';ctx.beginPath();ctx.arc(o.x+3,o.y+3,o.r,0,Math.PI*2);ctx.fill();
        ctx.fillStyle=o.color;ctx.beginPath();ctx.arc(o.x,o.y,o.r,0,Math.PI*2);ctx.fill();
        ctx.strokeStyle='rgba(0,0,0,.25)';ctx.lineWidth=2;ctx.stroke();
        ctx.fillStyle='rgba(255,255,255,.12)';ctx.beginPath();ctx.arc(o.x-o.r*.2,o.y-o.r*.2,o.r*.45,0,Math.PI*2);ctx.fill();
    }
}
function drawSkidMarks() {
    ctx.lineCap = 'round';
    for (let s of skidMarks) {
        ctx.globalAlpha = s.alpha * 0.6;
        ctx.strokeStyle = '#1a1a1a';
        ctx.lineWidth = s.w;
        ctx.beginPath();
        ctx.moveTo(s.x1, s.y1);
        ctx.lineTo(s.x2, s.y2);
        ctx.stroke();
    }
    ctx.globalAlpha = 1;
}
function drawCar(car) {
    if (!car.alive) return;
    ctx.save();
    ctx.translate(car.x,car.y);ctx.rotate(car.angle);

    // Power-up glow ring
    if (car.activePowerUp) {
        let puCols = { shield: '#44ffff', damage: '#ff4444', speed: '#ffff44', magnet: '#ff66ff' };
        let glowCol = puCols[car.activePowerUp] || '#fff';
        ctx.globalAlpha = 0.25 + Math.sin(performance.now()*0.008)*0.15;
        ctx.strokeStyle = glowCol; ctx.lineWidth = 4;
        ctx.beginPath(); ctx.arc(0, 0, 26, 0, Math.PI*2); ctx.stroke();
        ctx.globalAlpha = 1;
    }

    // Shadow
    ctx.fillStyle='rgba(0,0,0,.3)';ctx.fillRect(-CAR_W/2+3,-CAR_H/2+3,CAR_W,CAR_H);

    let col = car.color;
    if (car.invincible>0 && (car.invincible/3|0)%2) col='#fff';

    // Body
    ctx.fillStyle=col;
    ctx.beginPath();ctx.roundRect(-CAR_W/2,-CAR_H/2,CAR_W,CAR_H,4);ctx.fill();
    // Windshield
    ctx.fillStyle='rgba(100,180,255,.55)';ctx.fillRect(CAR_W/2-14,-CAR_H/2+3,8,CAR_H-6);
    // Rear
    ctx.fillStyle='rgba(0,0,0,.3)';ctx.fillRect(-CAR_W/2,-CAR_H/2+2,8,CAR_H-4);
    // Roof stripe
    ctx.fillStyle='rgba(255,255,255,.22)';ctx.fillRect(-5,-2,10,4);
    // Headlights
    ctx.fillStyle='#ffa';ctx.fillRect(CAR_W/2-3,-CAR_H/2+2,3,4);ctx.fillRect(CAR_W/2-3,CAR_H/2-6,3,4);
    // Tail lights
    ctx.fillStyle='#f00';ctx.fillRect(-CAR_W/2,-CAR_H/2+2,3,4);ctx.fillRect(-CAR_W/2,CAR_H/2-6,3,4);

    // Player badge (human players)
    if (car.playerIdx >= 0) {
        ctx.fillStyle='rgba(255,255,255,.35)';
        ctx.font='bold 10px Arial';ctx.textAlign='center';
        if (gameMode === 'single') {
            ctx.fillText('P1', 0, 4);
        } else {
            ctx.fillText(car.playerIdx===0?'P1':'P2', 0, 4);
        }
    } else {
        // AI roof marker — diamond shape
        ctx.fillStyle='rgba(255,255,255,.45)';
        ctx.beginPath();
        ctx.moveTo(0, -4); ctx.lineTo(4, 0); ctx.lineTo(0, 4); ctx.lineTo(-4, 0);
        ctx.closePath(); ctx.fill();
    }

    // AI body variation — spoiler or wider bumper
    if (car.playerIdx < 0) {
        let carIdx = cars.indexOf(car);
        if (carIdx % 2 === 0) {
            ctx.fillStyle='rgba(0,0,0,.5)';
            ctx.fillRect(-CAR_W/2 - 4, -CAR_H/2 + 2, 4, CAR_H - 4);
            ctx.fillStyle=col;
            ctx.fillRect(-CAR_W/2 - 3, -CAR_H/2 + 3, 3, CAR_H - 6);
        } else {
            ctx.fillStyle='rgba(0,0,0,.4)';
            ctx.fillRect(CAR_W/2, -CAR_H/2 - 2, 3, CAR_H + 4);
            ctx.fillStyle=col;
            ctx.fillRect(CAR_W/2, -CAR_H/2 - 1, 2, CAR_H + 2);
        }
    }

    // Damage cracks
    if (car.health<60){ctx.strokeStyle='rgba(0,0,0,.5)';ctx.lineWidth=1;for(let i=0;i<((100-car.health)/15|0);i++){let sx=(Math.random()-.5)*CAR_W*.8,sy=(Math.random()-.5)*CAR_H*.8;ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(sx+(Math.random()-.5)*12,sy+(Math.random()-.5)*12);ctx.stroke();}}

    // Smoke
    if (car.health<40&&Math.random()<.3) particles.push(mkParticle(car.x+(Math.random()-.5)*10,car.y+(Math.random()-.5)*10,(Math.random()-.5)*.5,-Math.random()*.5,car.health<20?'#333':'#888',5+Math.random()*8,.02));

    ctx.restore();

    // Player marker (multiplayer only: small triangle above the OTHER player's car)
    if (gameMode === 'multi' && car.playerIdx >= 0) {
        let markerColor = car.playerIdx === 0 ? P1_COLOR : P2_COLOR;
        let my = car.y - 38;
        // Pulsing triangle pointing down
        let pulse = 0.6 + Math.sin(performance.now() * 0.005) * 0.3;
        ctx.globalAlpha = pulse;
        ctx.fillStyle = markerColor;
        ctx.beginPath();
        ctx.moveTo(car.x, my + 8);
        ctx.lineTo(car.x - 6, my);
        ctx.lineTo(car.x + 6, my);
        ctx.closePath();
        ctx.fill();
        ctx.globalAlpha = 1;
    }
    let bw=32,bh=3,bx=car.x-bw/2,by=car.y-31;
    ctx.fillStyle='#333';ctx.fillRect(bx,by,bw,bh);
    let hp=car.health/car.maxHealth;
    ctx.fillStyle=hp>.5?'#4f4':hp>.25?'#ff4':'#f44';
    ctx.fillRect(bx,by,bw*hp,bh);
}
function drawDebris() {
    for (let d of debris){ctx.save();ctx.translate(d.x,d.y);ctx.rotate(d.angle);ctx.globalAlpha=Math.min(1,d.life/30);ctx.fillStyle=d.color;ctx.fillRect(-d.size/2,-d.size/2,d.size,d.size);ctx.globalAlpha=1;ctx.restore();}
}
function drawParticles() {
    for (let p of particles){ctx.globalAlpha=p.alpha;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();}
    ctx.globalAlpha=1;
}
function drawFloatingTexts() {
    ctx.textAlign='center';
    for (let f of floatingTexts){
        ctx.globalAlpha=f.alpha;
        if (f.bubble) {
            ctx.font='bold 13px Arial';
            let tw = ctx.measureText(f.text).width;
            let pw = tw + 14, ph = 22;
            let bx = f.x - pw/2, by = f.y - ph + 4;
            // Bubble background
            let r = 6;
            ctx.fillStyle = f.bubbleColor || '#fff';
            ctx.beginPath();
            ctx.moveTo(bx+r, by);
            ctx.lineTo(bx+pw-r, by);
            ctx.quadraticCurveTo(bx+pw, by, bx+pw, by+r);
            ctx.lineTo(bx+pw, by+ph-r);
            ctx.quadraticCurveTo(bx+pw, by+ph, bx+pw-r, by+ph);
            // Tail
            ctx.lineTo(f.x+4, by+ph);
            ctx.lineTo(f.x, by+ph+6);
            ctx.lineTo(f.x-4, by+ph);
            ctx.lineTo(bx+r, by+ph);
            ctx.quadraticCurveTo(bx, by+ph, bx, by+ph-r);
            ctx.lineTo(bx, by+r);
            ctx.quadraticCurveTo(bx, by, bx+r, by);
            ctx.closePath();
            ctx.fill();
            // Border
            ctx.strokeStyle='rgba(0,0,0,0.4)';
            ctx.lineWidth=1.5;
            ctx.stroke();
            // Text
            ctx.fillStyle='#fff';
            ctx.fillText(f.text, f.x, f.y);
        } else {
            ctx.font='bold 14px Arial';
            ctx.fillStyle=f.color;
            ctx.fillText(f.text,f.x,f.y);
        }
    }
    ctx.globalAlpha=1;
}

// ================================================================
//  HUD (drawn on-canvas per viewport)
// ================================================================
function drawHUD(car, vx, vy, vw, vh) {
    ctx.save();
    ctx.beginPath(); ctx.rect(vx,vy,vw,vh); ctx.clip();

    const pad = gameMode === 'single' ? 14 : 12;
    const isP1 = car.playerIdx === 0;
    const accent = isP1 ? P1_COLOR : P2_COLOR;

    if (gameMode === 'single') {
        // ======= SINGLE PLAYER HUD =======

        // --- Top-left: Controls reminder ---
        let clx = vx+pad, cly = vy+pad;
        ctx.fillStyle='rgba(0,0,0,.55)';
        ctx.fillRect(clx, cly, 148, 90);
        ctx.strokeStyle='rgba(255,255,255,.15)'; ctx.lineWidth=1;
        ctx.strokeRect(clx, cly, 148, 90);
        ctx.fillStyle='#777'; ctx.font='10px Arial'; ctx.textAlign='left';
        ctx.fillText('A/D or \u2190/\u2192  Steer', clx+8, cly+14);
        ctx.fillText('S or \u2193        Brake', clx+8, cly+28);
        ctx.fillText('W or \u2191        Nitro', clx+8, cly+42);
        ctx.fillText('Space         Handbrake', clx+8, cly+56);
        ctx.fillText('R             Reset', clx+8, cly+70);
        ctx.fillText('ESC           Pause', clx+8, cly+84);

        // --- Top-right: Stats panel (score, kills, deaths, AI left, timer) ---
        let trw = 190, trh = 112;
        let trx = vx+vw - pad - trw, tr_y = vy+pad;
        ctx.fillStyle='rgba(0,0,0,.65)';
        ctx.fillRect(trx, tr_y, trw, trh);
        ctx.strokeStyle=accent; ctx.lineWidth=1;
        ctx.strokeRect(trx, tr_y, trw, trh);

        ctx.fillStyle='#ff4'; ctx.font='bold 18px Courier New'; ctx.textAlign='left';
        ctx.fillText(`SCORE: ${score}`, trx+10, tr_y+22);

        let numAI = 11;
        let alive = cars.filter(c=>c.alive && c.playerIdx === -1).length;
        ctx.fillStyle='#aaa'; ctx.font='13px Courier New';
        ctx.fillText('KILLS ', trx+10, tr_y+44);
        ctx.fillStyle='#fff'; ctx.fillText(car.kills, trx+90, tr_y+44);

        ctx.fillStyle='#aaa';
        ctx.fillText('DEATHS', trx+10, tr_y+60);
        ctx.fillStyle='#fff'; ctx.fillText(car.deaths, trx+90, tr_y+60);

        ctx.fillStyle='#aaa';
        ctx.fillText('AI LEFT', trx+10, tr_y+76);
        ctx.fillStyle = alive > 0 ? '#f84' : '#4f4';
        ctx.fillText(`${alive}/${numAI}`, trx+90, tr_y+76);

        let mins = Math.floor(gameTime/60), secs = Math.floor(gameTime%60);
        ctx.fillStyle='#aaa';
        ctx.fillText('TIME  ', trx+10, tr_y+96);
        ctx.fillStyle='#fff';
        ctx.fillText(`${mins}:${secs.toString().padStart(2,'0')}`, trx+90, tr_y+96);

        // --- Bottom-left: Speed + Nitro ---
        let blx = vx+pad, bly = vy+vh - pad - 70;
        ctx.fillStyle='rgba(0,0,0,.65)';
        ctx.fillRect(blx, bly, 170, 70);
        ctx.strokeStyle=accent; ctx.lineWidth=1;
        ctx.strokeRect(blx, bly, 170, 70);

        let speed = Math.round(car.speed * 20);
        ctx.fillStyle='#4ff'; ctx.font='bold 28px Courier New'; ctx.textAlign='left';
        ctx.fillText(speed, blx+10, bly+30);
        ctx.fillStyle='#aaa'; ctx.font='13px Courier New';
        ctx.fillText('KMH', blx+90, bly+30);

        // Nitro bar (cooldown-based)
        ctx.fillStyle='#222'; ctx.fillRect(blx+10, bly+40, 150, 10);
        let nitroLabel, nitroBarW, nitroCol1, nitroCol2;
        if (car.nitroActive) {
            nitroBarW = 150 * (car.nitroBurnTimer / CONFIG.nitroBurnFrames);
            nitroCol1 = '#ff8800'; nitroCol2 = '#ffcc00';
            nitroLabel = 'BURN ' + Math.ceil(car.nitroBurnTimer / 60) + 's';
        } else if (car.nitroCooldown > 0) {
            nitroBarW = 150 * (1 - car.nitroCooldown / CONFIG.nitroCooldown);
            nitroCol1 = '#555'; nitroCol2 = '#777';
            nitroLabel = 'CHARGING ' + Math.ceil(car.nitroCooldown / 60) + 's';
        } else {
            nitroBarW = 150;
            nitroCol1 = '#00ccff'; nitroCol2 = '#00ff88';
            nitroLabel = 'READY';
        }
        let nitroGrad = ctx.createLinearGradient(blx+10, 0, blx+160, 0);
        nitroGrad.addColorStop(0, nitroCol1); nitroGrad.addColorStop(1, nitroCol2);
        ctx.fillStyle = nitroGrad;
        ctx.fillRect(blx+10, bly+40, nitroBarW, 10);
        ctx.fillStyle='#aaa'; ctx.font='9px Arial'; ctx.textAlign='center';
        ctx.fillText(nitroLabel, blx+85, bly+63);

        // --- Bottom-center: Health bar ---
        let hbw = 260, hbh = 20;
        let hbx = vx+vw/2 - hbw/2, hby = vy+vh - pad - 28;
        ctx.fillStyle='rgba(0,0,0,.65)';
        ctx.fillRect(hbx-4, hby-4, hbw+8, hbh+8);
        ctx.fillStyle='#333'; ctx.fillRect(hbx, hby, hbw, hbh);
        let hp = Math.max(0, car.health) / car.maxHealth;
        let hpColor = hp > .5 ? '#4f4' : hp > .25 ? '#ff4' : '#f44';
        ctx.fillStyle = hpColor;
        ctx.fillRect(hbx, hby, hbw * hp, hbh);
        ctx.strokeStyle = hpColor; ctx.lineWidth = 1;
        ctx.strokeRect(hbx, hby, hbw, hbh);
        ctx.fillStyle='#fff'; ctx.font='bold 12px Arial'; ctx.textAlign='center';
        ctx.fillText(`HP: ${Math.max(0,Math.round(car.health))}%`, hbx+hbw/2, hby+15);

        // --- Active power-up indicator (above health bar) ---
        if (car.alive && car.activePowerUp) {
            let puLabel = car.activePowerUp.toUpperCase();
            let puTime = Math.ceil(car.powerUpTimer / 60);
            let puColors = { shield: '#44ffff', damage: '#ff4444', speed: '#ffff44', magnet: '#ff66ff' };
            let puCol = puColors[car.activePowerUp] || '#fff';
            ctx.fillStyle='rgba(0,0,0,.6)';
            ctx.fillRect(vx+vw/2-70, hby-30, 140, 22);
            ctx.fillStyle=puCol; ctx.font='bold 13px Courier New'; ctx.textAlign='center';
            ctx.fillText(`${puLabel} ${puTime}s`, vx+vw/2, hby-14);
        }

        // --- If dead — show respawn countdown ---
        if (!car.alive) {
            ctx.fillStyle='rgba(0,0,0,.55)';
            ctx.fillRect(vx, vy, vw, vh);
            ctx.fillStyle='#f44'; ctx.font='bold 48px Arial'; ctx.textAlign='center';
            ctx.fillText('WRECKED!', vx+vw/2, vy+vh/2 - 30);
            let secLeft = Math.ceil(car.respawnTimer / 60);
            ctx.fillStyle='#fff'; ctx.font='bold 26px Arial';
            ctx.fillText(`Respawn in ${secLeft}...`, vx+vw/2, vy+vh/2 + 20);
        }

        // --- Minimap (bottom-right corner) ---
        let mmS = 140, mmx = vx+vw-pad-mmS, mmy = vy+vh-pad-mmS;
        ctx.fillStyle='rgba(20,30,10,.8)';
        ctx.fillRect(mmx, mmy, mmS, mmS);
        ctx.strokeStyle='#555'; ctx.lineWidth=1; ctx.strokeRect(mmx,mmy,mmS,mmS);
        ctx.fillStyle='#333';
        let mcx=mmx+mmS/2, mcy=mmy+mmS/2;
        ctx.beginPath();ctx.arc(mcx,mcy,mmS*520/ARENA_W,0,Math.PI*2);ctx.fill();
        for (let pu of powerUps) {
            let mx = mmx + (pu.x/ARENA_W)*mmS;
            let my = mmy + (pu.y/ARENA_H)*mmS;
            ctx.fillStyle = pu.color;
            ctx.fillRect(mx-2, my-2, 4, 4);
        }
        for (let c of cars) {
            if (!c.alive) continue;
            let mx = mmx + (c.x/ARENA_W)*mmS;
            let my = mmy + (c.y/ARENA_H)*mmS;
            ctx.fillStyle = c === car ? '#fff' : '#f44';
            let sz = c === car ? 5 : 3;
            ctx.fillRect(mx-sz/2, my-sz/2, sz, sz);
        }
        ctx.strokeStyle = accent; ctx.lineWidth = 1;
        let camRx = mmx + ((car.x - vw/2) / ARENA_W) * mmS;
        let camRy = mmy + ((car.y - vh/2) / ARENA_H) * mmS;
        let camRw = (vw / ARENA_W) * mmS;
        let camRh = (vh / ARENA_H) * mmS;
        ctx.strokeRect(camRx, camRy, camRw, camRh);

    } else {
        // ======= MULTIPLAYER HUD (per viewport) =======

        // --- Top: Player name & kills ---
        ctx.fillStyle='rgba(0,0,0,.65)';
        ctx.fillRect(vx+pad, vy+pad, 180, 78);
        ctx.strokeStyle=accent; ctx.lineWidth=1;
        ctx.strokeRect(vx+pad, vy+pad, 180, 78);

        ctx.fillStyle=accent; ctx.font='bold 16px Courier New'; ctx.textAlign='left';
        ctx.fillText(car.name, vx+pad+10, vy+pad+20);

        ctx.fillStyle='#aaa'; ctx.font='13px Courier New';
        ctx.fillText(`KILLS  `, vx+pad+10, vy+pad+40);
        ctx.fillStyle='#fff'; ctx.fillText(car.kills, vx+pad+80, vy+pad+40);

        ctx.fillStyle='#aaa';
        ctx.fillText(`HITS   `, vx+pad+10, vy+pad+56);
        ctx.fillStyle='#fff'; ctx.fillText(car.hits, vx+pad+80, vy+pad+56);

        let alive = cars.filter(c=>c.alive).length;
        ctx.fillStyle='#aaa';
        ctx.fillText(`ALIVE  `, vx+pad+10, vy+pad+72);
        ctx.fillStyle='#fff'; ctx.fillText(`${alive}/${cars.length}`, vx+pad+80, vy+pad+72);

        // --- Bottom-left: Speed + Nitro ---
        let blx = vx + pad, bly = vy + vh - pad - 70;
        ctx.fillStyle='rgba(0,0,0,.65)';
        ctx.fillRect(blx, bly, 160, 70);
        ctx.strokeStyle=accent; ctx.lineWidth=1;
        ctx.strokeRect(blx, bly, 160, 70);

        let speed = Math.round(car.speed * 20);
        ctx.fillStyle='#4ff'; ctx.font='bold 28px Courier New'; ctx.textAlign='left';
        ctx.fillText(speed, blx+10, bly+30);
        ctx.fillStyle='#aaa'; ctx.font='13px Courier New';
        ctx.fillText('KMH', blx+85, bly+30);

        // Nitro bar (cooldown-based)
        ctx.fillStyle='#222'; ctx.fillRect(blx+10, bly+40, 140, 10);
        let nitroLabel, nitroBarW, nitroCol1, nitroCol2;
        if (car.nitroActive) {
            nitroBarW = 140 * (car.nitroBurnTimer / CONFIG.nitroBurnFrames);
            nitroCol1 = '#ff8800'; nitroCol2 = '#ffcc00';
            nitroLabel = 'BURN ' + Math.ceil(car.nitroBurnTimer / 60) + 's';
        } else if (car.nitroCooldown > 0) {
            nitroBarW = 140 * (1 - car.nitroCooldown / CONFIG.nitroCooldown);
            nitroCol1 = '#555'; nitroCol2 = '#777';
            nitroLabel = 'CHARGING ' + Math.ceil(car.nitroCooldown / 60) + 's';
        } else {
            nitroBarW = 140;
            nitroCol1 = '#00ccff'; nitroCol2 = '#00ff88';
            nitroLabel = 'READY';
        }
        let nitroGrad = ctx.createLinearGradient(blx+10, 0, blx+150, 0);
        nitroGrad.addColorStop(0, nitroCol1); nitroGrad.addColorStop(1, nitroCol2);
        ctx.fillStyle = nitroGrad;
        ctx.fillRect(blx+10, bly+40, nitroBarW, 10);
        ctx.fillStyle='#aaa'; ctx.font='9px Arial'; ctx.textAlign='center';
        ctx.fillText(nitroLabel, blx+80, bly+63);

        // --- Bottom-center: Health bar ---
        let hbw = 200, hbh = 16;
        let hbx = vx + vw/2 - hbw/2, hby = vy + vh - pad - 22;
        ctx.fillStyle='rgba(0,0,0,.65)';
        ctx.fillRect(hbx-4, hby-4, hbw+8, hbh+8);
        ctx.fillStyle='#333'; ctx.fillRect(hbx, hby, hbw, hbh);
        let hp = Math.max(0, car.health) / car.maxHealth;
        let hpColor = hp > .5 ? '#4f4' : hp > .25 ? '#ff4' : '#f44';
        ctx.fillStyle = hpColor;
        ctx.fillRect(hbx, hby, hbw * hp, hbh);
        ctx.strokeStyle = hpColor; ctx.lineWidth = 1;
        ctx.strokeRect(hbx, hby, hbw, hbh);
        ctx.fillStyle='#fff'; ctx.font='bold 11px Arial'; ctx.textAlign='center';
        ctx.fillText(`${Math.max(0,Math.round(car.health))}%`, hbx+hbw/2, hby+12);

        // --- If dead — show respawn countdown ---
        if (!car.alive) {
            ctx.fillStyle='rgba(0,0,0,.55)';
            ctx.fillRect(vx, vy, vw, vh);
            ctx.fillStyle='#f44'; ctx.font='bold 36px Arial'; ctx.textAlign='center';
            ctx.fillText('WRECKED!', vx+vw/2, vy+vh/2 - 20);
            let secLeft = Math.ceil(car.respawnTimer / 60);
            ctx.fillStyle='#fff'; ctx.font='bold 22px Arial';
            ctx.fillText(`Respawn in ${secLeft}...`, vx+vw/2, vy+vh/2 + 20);
        }

        // --- Active power-up indicator ---
        if (car.alive && car.activePowerUp) {
            let puLabel = car.activePowerUp.toUpperCase();
            let puTime = Math.ceil(car.powerUpTimer / 60);
            let puColors = { shield: '#44ffff', damage: '#ff4444', speed: '#ffff44', magnet: '#ff66ff' };
            let puCol = puColors[car.activePowerUp] || '#fff';
            ctx.fillStyle='rgba(0,0,0,.6)';
            ctx.fillRect(vx+vw/2-60, vy+vh-pad-50, 120, 20);
            ctx.fillStyle=puCol; ctx.font='bold 12px Courier New'; ctx.textAlign='center';
            ctx.fillText(`${puLabel} ${puTime}s`, vx+vw/2, vy+vh-pad-36);
        }

        // --- Minimap (bottom-right corner of viewport) ---
        let mmS = 110, mmx = vx+vw-pad-mmS, mmy = vy+vh-pad-mmS;
        ctx.fillStyle='rgba(20,30,10,.8)';
        ctx.fillRect(mmx, mmy, mmS, mmS);
        ctx.strokeStyle='#555'; ctx.lineWidth=1; ctx.strokeRect(mmx,mmy,mmS,mmS);
        ctx.fillStyle='#333';
        let mcx=mmx+mmS/2, mcy=mmy+mmS/2;
        ctx.beginPath();ctx.arc(mcx,mcy,mmS*520/ARENA_W,0,Math.PI*2);ctx.fill();
        for (let pu of powerUps) {
            let mx = mmx + (pu.x/ARENA_W)*mmS;
            let my = mmy + (pu.y/ARENA_H)*mmS;
            ctx.fillStyle = pu.color;
            ctx.fillRect(mx-2, my-2, 4, 4);
        }
        for (let c of cars) {
            if (!c.alive) continue;
            let mx = mmx + (c.x/ARENA_W)*mmS;
            let my = mmy + (c.y/ARENA_H)*mmS;
            ctx.fillStyle = c === car ? '#fff' : c.playerIdx>=0 ? c.color : '#f44';
            let sz = c === car ? 4 : 2.5;
            ctx.fillRect(mx-sz/2, my-sz/2, sz, sz);
        }
        ctx.strokeStyle = accent; ctx.lineWidth = 1;
        let camRx = mmx + ((car.x - vw/2) / ARENA_W) * mmS;
        let camRy = mmy + ((car.y - vh/2) / ARENA_H) * mmS;
        let camRw = (vw / ARENA_W) * mmS;
        let camRh = (vh / ARENA_H) * mmS;
        ctx.strokeRect(camRx, camRy, camRw, camRh);

        // --- Controls reminder (top-right of viewport) ---
        let crx = vx + vw - pad - 110, cry = vy + pad;
        ctx.fillStyle='rgba(0,0,0,.5)';
        ctx.fillRect(crx, cry, 110, 68);
        ctx.fillStyle='#888'; ctx.font='10px Arial'; ctx.textAlign='left';
        if (isP1) {
            ctx.fillText('A/D  Steer', crx+8, cry+14);
            ctx.fillText('S    Brake', crx+8, cry+28);
            ctx.fillText('W    Nitro', crx+8, cry+42);
            ctx.fillText('Q    Drift', crx+8, cry+56);
        } else {
            ctx.fillText('\u2190/\u2192  Steer', crx+8, cry+14);
            ctx.fillText('\u2193    Brake', crx+8, cry+28);
            ctx.fillText('\u2191    Nitro', crx+8, cry+42);
            ctx.fillText('M    Drift', crx+8, cry+56);
        }

        // --- Timer (top-center) ---
        let mins = Math.floor(gameTime/60), secs = Math.floor(gameTime%60);
        ctx.fillStyle='rgba(0,0,0,.5)';
        ctx.fillRect(vx+vw/2-35, vy+pad, 70, 22);
        ctx.fillStyle='#fff'; ctx.font='bold 14px Courier New'; ctx.textAlign='center';
        ctx.fillText(`${mins}:${secs.toString().padStart(2,'0')}`, vx+vw/2, vy+pad+16);
    }

    ctx.restore();
}

// ================================================================
//  RENDER WORLD FROM A CAMERA
// ================================================================
function renderWorld(camX, camY) {
    drawTerrain();
    drawSkidMarks();
    drawWalls();
    drawObstacles();
    drawBushes();
    drawDebris();
    for (let c of cars) {
        if (!c.alive) {
            ctx.save();ctx.translate(c.x,c.y);ctx.rotate(c.angle);
            ctx.globalAlpha=.45;ctx.fillStyle='#222';
            ctx.fillRect(-CAR_W/2,-CAR_H/2,CAR_W,CAR_H);
            if (Math.random()<.2) particles.push(mkParticle(c.x+(Math.random()-.5)*20,c.y+(Math.random()-.5)*20,(Math.random()-.5)*.5,-Math.random()*.8,['#f80','#f40','#ff0'][Math.random()*3|0],4+Math.random()*6,.03));
            ctx.globalAlpha=1;ctx.restore();
        }
    }
    drawPowerUps();
    for (let c of cars) if (c.alive) drawCar(c);
    drawParticles();
    drawFloatingTexts();
}

// ================================================================
//  SPLIT-SCREEN DIVIDER
// ================================================================
function drawDivider() {
    let cx = canvas.width / 2;
    ctx.fillStyle = '#000';
    ctx.fillRect(cx - 2, 0, 4, canvas.height);
    ctx.strokeStyle = '#444'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(cx, 0); ctx.lineTo(cx, canvas.height); ctx.stroke();
}

// ================================================================
//  COUNTDOWN
// ================================================================
function drawCountdown() {
    ctx.fillStyle = 'rgba(0,0,0,.6)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#fff'; ctx.font = 'bold 120px Arial'; ctx.textAlign = 'center';
    let text = countdownVal > 0 ? countdownVal.toString() : 'GO!';
    if (countdownVal <= 0) ctx.fillStyle = '#4f4';
    ctx.fillText(text, canvas.width/2, canvas.height/2 + 40);
}

// ================================================================
//  START / MAIN LOOP
// ================================================================
function showStartScreen() {
    document.getElementById('game-over-screen').style.display = 'none';
    document.getElementById('pause-overlay').style.display = 'none';
    document.getElementById('start-screen').style.display = 'flex';
    document.getElementById('ingame-fullscreen-btn').style.display = 'none';
    paused = false;
    selectMode(gameMode);
    gameState = 'menu';
}

function startGame() {
    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('game-over-screen').style.display = 'none';
    document.getElementById('pause-overlay').style.display = 'none';
    document.getElementById('ingame-fullscreen-btn').style.display = 'block';

    ensureAudio();
    gameState = 'countdown';
    countdownVal = 3;
    countdownTimer = 0;
    gameTime = 0;
    score = 0;
    particles = []; skidMarks = []; debris = []; floatingTexts = [];
    powerUps = []; powerUpSpawnTimer = 0;
    generateTerrain();
    spawnCars();
}

let lastTime = 0;

function loop(ts) {
    let dt = Math.min((ts - lastTime) / 1000, 0.05);
    lastTime = ts;

    // ---- Countdown ----
    if (gameState === 'countdown') {
        countdownTimer += dt;
        if (countdownTimer >= 1) {
            countdownTimer = 0;
            if (countdownVal > 0) {
                playSfx('countdown');
            }
            countdownVal--;
            if (countdownVal < 0) {
                gameState = 'playing';
                playSfx('go');
            } else if (countdownVal === 0) {
                playSfx('go');
            }
        }
    }

    // ---- Update ----
    if (gameState === 'playing') {
        gameTime += dt;

        // Survival score: +10 per second (single player only)
        if (gameMode === 'single') {
            score += Math.round(dt * 10);
        }

        // Update players
        updatePlayer(cars[0]);
        if (gameMode === 'multi') {
            updatePlayer(cars[1]);
        }

        // Update AI
        let aiStartIdx = gameMode === 'single' ? 1 : 2;
        for (let i = aiStartIdx; i < cars.length; i++) updateAI(cars[i], dt);

        for (let c of cars) moveCar(c);
        checkCollisions();
        updatePowerUps();

        // Respawn timer for dead players
        for (let c of cars) {
            if (!c.alive && c.playerIdx >= 0 && c.respawnTimer > 0) {
                c.respawnTimer--;
                if (c.respawnTimer <= 0) {
                    respawnCar(c);
                    playSfxThrottled('go', 100);
                }
            }
        }
        updateFX();
    } else if (gameState === 'countdown') {
        updateFX();
    }

    // ---- Render ----
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (cars.length > 0) {
        if (gameMode === 'single') {
            // ---- Single player: full-screen viewport ----
            let fullW = canvas.width;
            let fullH = canvas.height;
            let player = cars[0];
            let camX = player.x - fullW/2;
            let camY = player.y - fullH/2;

            ctx.save();
            ctx.translate(-camX, -camY);
            renderWorld(camX, camY);
            ctx.restore();

            drawHUD(player, 0, 0, fullW, fullH);

            if (gameState === 'countdown') drawCountdown();
        } else {
            // ---- Multiplayer: split screen ----
            let halfW = Math.floor(canvas.width / 2);
            let fullH = canvas.height;

            // Left viewport (Player 1)
            let p1 = cars[0];
            let cam1x = p1.x - halfW/2;
            let cam1y = p1.y - fullH/2;

            ctx.save();
            ctx.beginPath(); ctx.rect(0, 0, halfW, fullH); ctx.clip();
            ctx.translate(-cam1x, -cam1y);
            renderWorld(cam1x, cam1y);
            ctx.restore();
            drawHUD(p1, 0, 0, halfW, fullH);

            // Right viewport (Player 2)
            let p2 = cars[1];
            let cam2x = p2.x - halfW/2;
            let cam2y = p2.y - fullH/2;

            ctx.save();
            ctx.beginPath(); ctx.rect(halfW, 0, halfW, fullH); ctx.clip();
            ctx.translate(halfW - cam2x, -cam2y);
            renderWorld(cam2x, cam2y);
            ctx.restore();
            drawHUD(p2, halfW, 0, halfW, fullH);

            drawDivider();

            if (gameState === 'countdown') drawCountdown();
        }
    }

    requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>
</body>
</html>
